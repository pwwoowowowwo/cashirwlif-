<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلل الشهري - شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f7f6; --green: #27ae60; --red: #c0392b; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-back { padding: 10px 20px; background: var(--maroon); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
        
        /* كروت الإحصائيات الشهرية */
        .monthly-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .m-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .m-card small { color: #7f8c8d; font-size: 14px; }
        .m-card b { display: block; font-size: 24px; margin-top: 10px; color: var(--maroon); }

        /* شريط تحليل المصاريف */
        .analysis-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .progress-group { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
        .bar-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; transition: 1s; width: 0%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 المحلل المالي الشهري</h2>
        <a href="index.html" class="btn-back">الرجوع للرئيسية</a>
    </div>

    <div class="monthly-stats">
        <div class="m-card" style="border-top: 5px solid var(--green);">
            <small>إجمالي مبيعات الشهر 💰</small>
            <b id="monthSales">0.00</b>
        </div>
        <div class="m-card" style="border-top: 5px solid var(--red);">
            <small>إجمالي مصروفات الشهر 💸</small>
            <b id="monthExps">0.00</b>
        </div>
        <div class="m-card" style="background: var(--maroon); color: white;">
            <small style="color: #ddd;">صافي ربح الشهر ✨</small>
            <b id="monthNet" style="color: var(--gold); font-size: 30px;">0.00</b>
        </div>
    </div>

    <div class="analysis-section">
        <h3>🔍 تحليل كفاءة الشهر (<span id="monthName"></span>)</h3>
        
        <div class="progress-group">
            <div class="progress-label">
                <span>نسبة الربح من الدخل</span>
                <span id="profitPercent">0%</span>
            </div>
            <div class="bar-bg"><div id="profitBar" class="bar-fill" style="background: var(--green);"></div></div>
        </div>

        <div class="progress-group">
            <div class="progress-label">
                <span>نسبة المصاريف والمشتريات</span>
                <span id="expPercent">0%</span>
            </div>
            <div class="bar-bg"><div id="expBar" class="bar-fill" style="background: var(--red);"></div></div>
        </div>

        <div style="margin-top: 30px; padding: 15px; background: #fffdf5; border-radius: 10px; border-right: 5px solid var(--gold);">
            <strong>💡 نصيحة المحلل:</strong>
            <p id="aiAdvice" style="margin: 10px 0 0; color: #555;">جاري تحليل البيانات...</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadMonthlyData() {
        const now = new Date();
        const currentMonth = (now.getMonth() + 1).toString().padStart(2, '0');
        const currentYear = now.getFullYear();
        const monthKey = `${currentYear}-${currentMonth}`; // يطابق YYYY-MM
        
        document.getElementById('monthName').innerText = now.toLocaleString('ar-SA', { month: 'long' });

        let salesTotal = 0, expsTotal = 0, pursTotal = 0;

        // جلب المبيعات
        db.ref('sales').once('value', snap => {
            snap.forEach(child => {
                if(child.val().date && child.val().date.startsWith(monthKey)) {
                    salesTotal += parseFloat(child.val().amount || child.val().total || 0);
                }
            });

            // جلب المصاريف والمشتريات
            db.ref('expenses').once('value', eSnap => {
                eSnap.forEach(child => {
                    if(child.val().date && child.val().date.startsWith(monthKey)) {
                        expsTotal += parseFloat(child.val().amount || 0);
                    }
                });

                db.ref('purchases').once('value', pSnap => {
                    pSnap.forEach(child => {
                        if(child.val().date && child.val().date.startsWith(monthKey)) {
                            pursTotal += parseFloat(child.val().amount || 0);
                        }
                    });

                    renderAnalysis(salesTotal, expsTotal + pursTotal);
                });
            });
        });
    }

    function renderAnalysis(sales, costs) {
        const net = sales - costs;
        document.getElementById('monthSales').innerText = sales.toLocaleString() + " ر.س";
        document.getElementById('monthExps').innerText = costs.toLocaleString() + " ر.س";
        document.getElementById('monthNet').innerText = net.toLocaleString() + " ر.س";

        const expRatio = sales > 0 ? (costs / sales) * 100 : (costs > 0 ? 100 : 0);
        const profitRatio = 100 - expRatio;

        document.getElementById('expPercent').innerText = Math.round(expRatio) + "%";
        document.getElementById('expBar').style.width = Math.min(expRatio, 100) + "%";
        
        document.getElementById('profitPercent').innerText = Math.round(profitRatio) + "%";
        document.getElementById('profitBar').style.width = Math.max(profitRatio, 0) + "%";

        // نصيحة المحلل
        let advice = "";
        if (profitRatio > 60) advice = "أداء ممتاز يا شباب! الربح الصافي يتجاوز 60%، استمروا في الحفاظ على جودة الخدمة.";
        else if (profitRatio > 30) advice = "أداء مستقر، حاولوا تقليل تكاليف المشتريات قليلاً لزيادة الهامش الربحي.";
        else advice = "تنبيه: المصاريف مرتفعة جداً هذا الشهر. راجعوا فواتير المشتريات والرواتب فوراً.";
        
        document.getElementById('aiAdvice').innerText = advice;
    }

    window.onload = loadMonthlyData;
</script>
</body>
</html>
