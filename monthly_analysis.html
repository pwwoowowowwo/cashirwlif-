<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلل الشهري - شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f7f6; --green: #27ae60; --red: #c0392b; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; direction: rtl; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-back { padding: 10px 20px; background: var(--maroon); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 14px; }
        
        .monthly-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .m-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .m-card small { color: #7f8c8d; font-size: 15px; font-weight: bold; }
        .m-card b { display: block; font-size: 28px; margin-top: 10px; color: var(--maroon); }
        
        .analysis-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .progress-group { margin-bottom: 25px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 16px; }
        .bar-bg { background: #eee; height: 15px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; transition: 1.5s cubic-bezier(0.1, 0, 0.3, 1); width: 0%; }

        .advice-box { margin-top: 30px; padding: 20px; background: #fffdf5; border-radius: 15px; border-right: 6px solid var(--gold); }
        
        @media (max-width: 600px) { .monthly-stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color:var(--maroon);">📊 المحلل الشهري <small style="font-size:12px; color:var(--gold);" id="currentMonthLabel"></small></h2>
        <a href="index.html" class="btn-back">🔙 الرئيسية</a>
    </div>

    <div class="monthly-stats">
        <div class="m-card" style="border-top: 6px solid var(--green);">
            <small>إجمالي المبيعات (دخل)</small>
            <b id="monthSales">0.00</b>
        </div>
        <div class="m-card" style="border-top: 6px solid var(--red);">
            <small>إجمالي التكاليف (خارج)</small>
            <b id="monthExps">0.00</b>
        </div>
        <div class="m-card" style="background: var(--maroon); color: white;">
            <small style="color: #ddd;">صافي الأرباح</small>
            <b id="monthNet" style="color: var(--gold);">0.00</b>
        </div>
    </div>

    <div class="analysis-section">
        <h3>🔍 تحليل الأداء لشهر <span id="monthName"></span></h3>
        
        <div class="progress-group">
            <div class="progress-label"><span>نسبة الربحية</span><span id="profitPercent">0%</span></div>
            <div class="bar-bg"><div id="profitBar" class="bar-fill" style="background: var(--green);"></div></div>
        </div>

        <div class="progress-group">
            <div class="progress-label"><span>نسبة التكاليف</span><span id="expPercent">0%</span></div>
            <div class="bar-bg"><div id="expBar" class="bar-fill" style="background: var(--red);"></div></div>
        </div>

        <div class="advice-box">
            <strong style="font-size:18px;">💡 نصيحة فنية:</strong>
            <p id="aiAdvice" style="margin: 10px 0 0; color: #555; line-height: 1.6;">جاري جمع البيانات وتحليلها...</p>
        </div>
    </div>
</div>

<script>
    // تهيئة Firebase بنفس الرابط الخاص بك
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadMonthlyData() {
        const now = new Date();
        const currentMonth = now.getMonth(); // الشهر الحالي (0-11)
        const currentYear = now.getFullYear();
        
        const monthAr = now.toLocaleString('ar-SA', { month: 'long' });
        document.getElementById('monthName').innerText = monthAr;
        document.getElementById('currentMonthLabel').innerText = monthAr + " " + currentYear;

        let salesTotal = 0;
        let costsTotal = 0;

        // المسارات التي سنقوم بجلب البيانات منها
        const paths = [
            { name: 'sales', type: 'income' },
            { name: 'expenses', type: 'outcome' },
            { name: 'purchases', type: 'outcome' }
        ];

        let finished = 0;

        paths.forEach(p => {
            db.ref(p.name).once('value', snap => {
                snap.forEach(child => {
                    const val = child.val();
                    let itemDate = null;

                    // معالجة التاريخ الذكي (Timestamp أو Date)
                    if (val.timestamp) {
                        itemDate = new Date(val.timestamp);
                    } else if (val.date) {
                        itemDate = new Date(val.date);
                    }

                    // التحقق من صحة التاريخ ومطابقته للشهر الحالي
                    if (itemDate && !isNaN(itemDate.getTime())) {
                        if (itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear) {
                            
                            // جمع القيمة المالية بأي مسمى موجود
                            const amount = parseFloat(val.amount || val.total || val.price || val.cost || 0);
                            
                            if (p.type === 'income') salesTotal += amount;
                            else costsTotal += amount;
                        }
                    }
                });

                finished++;
                // عند الانتهاء من جلب كل الجداول، نقوم بالتحديث
                if (finished === paths.length) {
                    updateUI(salesTotal, costsTotal);
                }
            });
        });
    }

    function updateUI(sales, costs) {
        const net = sales - costs;
        
        // عرض الأرقام مع فواصل آلاف
        document.getElementById('monthSales').innerText = sales.toLocaleString('en-US', {minimumFractionDigits: 2}) + " ر.س";
        document.getElementById('monthExps').innerText = costs.toLocaleString('en-US', {minimumFractionDigits: 2}) + " ر.س";
        document.getElementById('monthNet').innerText = net.toLocaleString('en-US', {minimumFractionDigits: 2}) + " ر.س";

        // حساب النسب المئوية
        const expRatio = sales > 0 ? (costs / sales) * 100 : (costs > 0 ? 100 : 0);
        const profitRatio = Math.max(0, 100 - expRatio);

        // تحديث الأعمدة والنسب
        document.getElementById('expPercent').innerText = Math.round(expRatio) + "%";
        document.getElementById('expBar').style.width = Math.min(expRatio, 100) + "%";
        
        document.getElementById('profitPercent').innerText = Math.round(profitRatio) + "%";
        document.getElementById('profitBar').style.width = profitRatio + "%";

        // اختيار النصيحة بناءً على الربحية
        let advice = "";
        if (sales === 0) {
            advice = "لم يتم تسجيل أي مبيعات لهذا الشهر حتى الآن. ابدأ بتسجيل العمليات لمشاهدة التحليل.";
        } else if (profitRatio > 65) {
            advice = "أداء استثنائي ! نسبة الربح ممتازة جداً. حافظ على مستوى جودة المواد والمشتريات الحالي.";
        } else if (profitRatio > 40) {
            advice = "المحل في وضع صحي ومستقر. حاول مراجعة المصاريف النثرية لرفع نسبة الصافي إلى 50%.";
        } else if (profitRatio > 0) {
            advice = "تنبيه: التكاليف مرتفعة وتأكل جزءاً كبيراً من الدخل. راجع أسعار الموردين أو قلل من الهدر في المواد.";
        } else {
            advice = "تحذير: المصاريف تتجاوز المبيعات! يجب مراجعة خطة التشغيل فوراً لتقليل الخسائر.";
        }
        
        document.getElementById('aiAdvice').innerText = advice;
    }

    // تشغيل الدالة عند فتح الصفحة
    window.onload = loadMonthlyData;
</script>

</body>
</html>
