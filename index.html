<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta tags for No-Cache to ensure updates appear immediately -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/shahi-walif/assets/main/logo.png">
    <link rel="icon" href="https://raw.githubusercontent.com/shahi-walif/assets/main/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="شاهي وليف">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>لوحة تحكم شاهي وليف</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { 
            --maroon: #630000; --gold: #c5a059; --bg: #f8f9fa; 
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #offline-notice {
            display: none; width: 100%; background: var(--red); color: white;
            text-align: center; padding: 8px; font-size: 13px; position: fixed; top: 0; z-index: 1000; font-weight: bold;
        }

        .header { text-align: center; margin-top: 30px; margin-bottom: 25px; }
        .header h1 { color: var(--maroon); margin: 0; font-size: 32px; font-weight: 900; }
        .header p { color: var(--gold); margin: 5px 0; font-weight: bold; font-size: 15px; }

        .stats-grid { 
            width: 100%; max-width: 900px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; 
        }
        .stat-card { 
            background: white; padding: 15px; border-radius: 18px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            border-bottom: 4px solid var(--gold);
        }
        .stat-card.profit { border-bottom-color: var(--green); background: #fafffa; grid-column: span 3; margin-top: 5px; padding: 20px; }
        .stat-card b { color: var(--maroon); font-size: 18px; font-weight: 900; }
        .stat-card.profit b { color: var(--green); font-size: 26px; }

        .main-container { width: 100%; max-width: 900px; }
        .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; }
        
        .section-card { 
            background: white; border-radius: 22px; padding: 25px 10px; 
            text-decoration: none; border: 1px solid #f0f0f0; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: transform 0.2s; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .section-card:active { transform: scale(0.95); background: #fdfdfd; }
        
        .icon-circle { width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 30px; }

        .sales .icon-circle { background: #e8faf0; color: var(--green); }
        .purchases .icon-circle { background: #e3f2fd; color: var(--blue); }
        .expenses .icon-circle { background: #fdf2f2; color: var(--red); }
        .inventory .icon-circle { background: #ebf5fb; color: var(--blue); }
        .staff .icon-circle { background: #f5eef8; color: var(--purple); }

        .footer-tag { margin-top: auto; padding: 40px 0 20px; text-align: center; color: #bdc3c7; font-size: 14px; }
        .footer-tag b { color: var(--maroon); font-size: 16px; }
    </style>
</head>
<body>

<div id="offline-notice">⚠️ أنت تعمل الآن بدون إنترنت - سيتم مزامنة البيانات تلقائياً</div>

<div class="header">
    <div style="font-size:50px">🍃</div>
    <h1>شاهي وليف</h1>
    <p>لوحة التحكم الرئيسية</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <small>المبيعات 💰</small><br>
        <b id="todaySales">0.00</b>
    </div>
    <div class="stat-card">
        <small>المشتريات 🛒</small><br>
        <b id="todayPurchases" style="color:var(--blue)">0.00</b>
    </div>
    <div class="stat-card">
        <small>المصاريف 💸</small><br>
        <b id="todayExpenses" style="color:var(--red)">0.00</b>
    </div>
    <div class="stat-card profit">
        <small>صافي الربح المتوقع ✨</small><br>
        <b id="netProfit">0.00</b> <small style="display:inline">﷼</small>
    </div>
</div>

<div class="main-container">
    <div class="sections-grid">
        <!-- تم حذف زر الكاشير من هنا -->
        <a href="sales.html" class="section-card sales">
            <div class="icon-circle">📈</div>
            <h3>المبيعات</h3>
        </a>
        <a href="purchases.html" class="section-card purchases">
            <div class="icon-circle">🛒</div>
            <h3>المشتريات</h3>
        </a>
        <a href="expenses.html" class="section-card expenses">
            <div class="icon-circle">💸</div>
            <h3>المصاريف</h3>
        </a>
        <a href="inventory.html" class="section-card inventory">
            <div class="icon-circle">📦</div>
            <h3>الأصناف</h3>
        </a>
        <a href="employees.html" class="section-card staff">
            <div class="icon-circle">🛒</div>
            <h3>كاشير المبيعات</h3>
        </a>
    </div>
</div>

<div class="footer-tag">
    تصميم وتطوير <br>
    <b>فهد المخلفي</b>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    function syncData() {
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            document.getElementById('offline-notice').style.display = snap.val() === true ? 'none' : 'block';
        });

        // مزامنة المبيعات اللحظية وحساب الأرباح
        db.ref('sales').on('value', snap => {
            let total = 0;
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            snap.forEach(child => {
                const sale = child.val();
                if(sale.timestamp >= startOfToday) {
                    total += parseFloat(sale.total || 0);
                }
            });
            document.getElementById('todaySales').innerText = total.toFixed(2);
            calculateNet();
        });

        db.ref('purchases').on('value', snap => {
            let total = 0;
            const todayStr = new Date().toLocaleDateString('en-CA');
            snap.forEach(child => {
                const data = child.val();
                if(data.date === todayStr) total += parseFloat(data.amount || 0);
            });
            document.getElementById('todayPurchases').innerText = total.toFixed(2);
            calculateNet();
        });

        db.ref('expenses').on('value', snap => {
            let total = 0;
            const todayStr = new Date().toLocaleDateString('en-CA');
            snap.forEach(child => {
                const data = child.val();
                if(data.date === todayStr) total += parseFloat(data.amount || 0);
            });
            document.getElementById('todayExpenses').innerText = total.toFixed(2);
            calculateNet();
        });
    }

    function calculateNet() {
        const sales = parseFloat(document.getElementById('todaySales').innerText) || 0;
        const purchases = parseFloat(document.getElementById('todayPurchases').innerText) || 0;
        const expenses = parseFloat(document.getElementById('todayExpenses').innerText) || 0;
        const net = sales - (purchases + expenses);
        document.getElementById('netProfit').innerText = net.toFixed(2);
    }

    window.onload = syncData;
</script>
</body>
</html>
