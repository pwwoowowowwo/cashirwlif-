<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- أيقونة البرنامج عند الحفظ على الشاشة الرئيسية -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/shahi-walif/assets/main/logo.png">
    <link rel="icon" href="https://raw.githubusercontent.com/shahi-walif/assets/main/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="شاهي وليف">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>لوحة تحكم شاهي وليف</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { 
            --maroon: #630000; --gold: #c5a059; --bg: #f8f9fa; 
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* تنبيه حالة الاتصال */
        #offline-notice {
            display: none; width: 100%; background: var(--red); color: white;
            text-align: center; padding: 5px; font-size: 12px; position: fixed; top: 0; z-index: 1000;
        }

        .header { text-align: center; margin-top: 20px; margin-bottom: 25px; }
        .header h1 { color: var(--maroon); margin: 0; font-size: 30px; font-weight: 900; }
        .header p { color: var(--gold); margin: 5px 0; font-weight: bold; font-size: 14px; }

        .stats-grid { 
            width: 100%; max-width: 900px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; 
        }
        .stat-card { 
            background: white; padding: 12px; border-radius: 18px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            border-bottom: 4px solid var(--gold);
        }
        .stat-card.profit { border-bottom-color: var(--green); background: #fafffa; grid-column: span 3; margin-top: 5px; padding: 15px; }
        .stat-card b { color: var(--maroon); font-size: 16px; font-weight: 900; }
        .stat-card.profit b { color: var(--green); font-size: 22px; }

        .main-container { width: 100%; max-width: 900px; }
        .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; width: 100%; }
        
        .section-card { 
            background: white; border-radius: 22px; padding: 20px 10px; 
            text-decoration: none; border: 1px solid #f0f0f0; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: 0.3s;
        }
        .icon-circle { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 28px; }

        .cashier .icon-circle { background: #fff4e5; color: #f39c12; }
        .sales .icon-circle { background: #e8faf0; color: var(--green); }
        .purchases .icon-circle { background: #e3f2fd; color: var(--blue); }
        .expenses .icon-circle { background: #fdf2f2; color: var(--red); }
        .inventory .icon-circle { background: #ebf5fb; color: var(--blue); }
        .staff .icon-circle { background: #f5eef8; color: var(--purple); }

        .footer-tag { margin-top: auto; padding: 40px 0 20px; text-align: center; color: #bdc3c7; font-size: 14px; }
        .footer-tag b { color: var(--maroon); font-size: 16px; }
    </style>
</head>
<body>

<div id="offline-notice">أنت تعمل الآن بدون إنترنت - سيتم حفظ البيانات محلياً</div>

<div class="header">
    <div style="font-size:45px">🍃</div>
    <h1>شاهي وليف</h1>
    <p>نظام الإدارة المتكامل</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <small>المبيعات 💰</small>
        <b id="todaySales">0.00</b>
    </div>
    <div class="stat-card">
        <small>المشتريات 🛒</small>
        <b id="todayPurchases" style="color:var(--blue)">0.00</b>
    </div>
    <div class="stat-card">
        <small>المصاريف 💸</small>
        <b id="todayExpenses" style="color:var(--red)">0.00</b>
    </div>
    <div class="stat-card profit">
        <small>صافي الربح ✨</small>
        <b id="netProfit">0.00</b> <small style="display:inline">﷼</small>
    </div>
</div>

<div class="main-container">
    <div class="sections-grid">
        <a href="cashier.html" class="section-card cashier">
            <div class="icon-circle">🏪</div>
            <h3>الكاشير</h3>
        </a>
        <a href="sales.html" class="section-card sales">
            <div class="icon-circle">📈</div>
            <h3>المبيعات</h3>
        </a>
        <a href="purchases.html" class="section-card purchases">
            <div class="icon-circle">🛒</div>
            <h3>المشتريات</h3>
        </a>
        <a href="expenses.html" class="section-card expenses">
            <div class="icon-circle">💸</div>
            <h3>المصاريف</h3>
        </a>
        <a href="inventory.html" class="section-card inventory">
            <div class="icon-circle">📦</div>
            <h3>الأصناف</h3>
        </a>
        <a href="employees.html" class="section-card staff">
            <div class="icon-circle">👥</div>
            <h3>الموظفين</h3>
        </a>
    </div>
</div>

<div class="footer-tag">
    تصميم وتطوير <br>
    <b>فهد المخلفي</b>
</div>

<script>
    // تهيئة فايبربيز مع خاصية العمل أوفلاين
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // تفعيل حفظ البيانات محلياً (Persistence)
    // ملاحظة: قاعدة بيانات Realtime Database تحفظ البيانات تلقائياً عند انقطاع الشبكة وترفعها فور عودتها
    
    function syncData() {
        const today = new Date().toLocaleDateString('ar-SA');
        
        // متابعة حالة الاتصال
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                document.getElementById('offline-notice').style.display = 'none';
            } else {
                document.getElementById('offline-notice').style.display = 'block';
            }
        });

        // جلب البيانات مع دعم التخزين المؤقت
        ['sales', 'purchases', 'expenses'].forEach(path => {
            db.ref(path).on('value', snap => {
                let total = 0;
                snap.forEach(c => {
                    if(c.val().date === today) total += parseFloat(c.val().amount || 0);
                });
                if(path === 'sales') document.getElementById('todaySales').innerText = total.toFixed(2);
                if(path === 'purchases') document.getElementById('todayPurchases').innerText = total.toFixed(2);
                if(path === 'expenses') document.getElementById('todayExpenses').innerText = total.toFixed(2);
                calculateNet();
            });
        });
    }

    function calculateNet() {
        const s = parseFloat(document.getElementById('todaySales').innerText) || 0;
        const p = parseFloat(document.getElementById('todayPurchases').innerText) || 0;
        const e = parseFloat(document.getElementById('todayExpenses').innerText) || 0;
        document.getElementById('netProfit').innerText = (s - (p + e)).toFixed(2);
    }

    window.onload = syncData;

    // كود تشغيل البرنامج كتطبيق (Offline Service Worker)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed'));
        });
    }
</script>
</body>
</html>
