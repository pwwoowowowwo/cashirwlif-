<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل مبيعات شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-back { background: #eee; color: #333; }
        .btn-gold { background: var(--gold); color: white; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 8px; border-bottom: 4px solid var(--maroon); text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 20px; color: var(--maroon); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f8f8; padding: 12px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .reprint-btn { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar no-print">
        <a href="index.html" class="btn btn-back">⬅ الكاشير</a>
        <button class="btn btn-gold" onclick="generateReport()">📊 تقرير جرد الأصناف</button>
    </div>

    <div class="stats-row no-print">
        <div class="stat-card"><span>مبيعات اليوم</span><br><b id="dayTotal">0.00</b></div>
        <div class="stat-card"><span>الطلبات</span><br><b id="dayOrders">0</b></div>
        <div class="stat-card"><span>الضريبة</span><br><b id="dayTax">0.00</b></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>الوقت</th>
                <th>الأصناف</th>
                <th>الإجمالي</th>
                <th class="no-print">إجراء</th>
            </tr>
        </thead>
        <tbody id="salesTableBody"></tbody>
    </table>
</div>

<div id="reportModal" class="no-print">
    <div class="modal-content">
        <h3 style="text-align:center;">تقرير جرد مبيعات اليوم</h3>
        <hr>
        <div id="reportArea"></div>
        <button class="btn btn-gold" style="width:100%; margin-top:15px; justify-content:center;" onclick="window.print()">🖨 طباعة التقرير</button>
        <button class="btn" style="width:100%; margin-top:5px; justify-content:center;" onclick="document.getElementById('reportModal').style.display='none'">إغلاق</button>
    </div>
</div>

<script>
    // ضع بيانات Firebase الخاصة بك هنا
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSales = [];

    db.ref('sales').on('value', (snap) => {
        const data = snap.val();
        allSales = [];
        if (!data) return;
        Object.keys(data).forEach(id => allSales.push({ id, ...data[id] }));
        allSales.sort((a,b) => b.timestamp - a.timestamp);
        
        let total = 0, tax = 0, count = 0;
        const today = new Date().toDateString();
        const html = allSales.map(s => {
            const date = new Date(s.timestamp);
            if(date.toDateString() === today) {
                total += parseFloat(s.total);
                tax += (parseFloat(s.total) * 0.15 / 1.15); // حسبة تقريبية للضريبة
                count++;
            }
            return `<tr>
                <td>${date.toLocaleTimeString('ar-SA')}</td>
                <td>${s.items.map(i => i.name + ' (' + i.qty + ')').join(', ')}</td>
                <td>${parseFloat(s.total).toFixed(2)} ﷼</td>
                <td class="no-print"><button class="reprint-btn" onclick="reprint('${s.id}')">🖨 طباعة</button></td>
            </tr>`;
        }).join('');
        
        document.getElementById('salesTableBody').innerHTML = html;
        document.getElementById('dayTotal').innerText = total.toFixed(2) + " ﷼";
        document.getElementById('dayOrders').innerText = count;
        document.getElementById('dayTax').innerText = tax.toFixed(2) + " ﷼";
    });

    function reprint(id) {
        const s = allSales.find(x => x.id === id);
        const win = window.open('', '', 'width=400,height=600');
        win.document.write('<div dir="rtl" style="font-family:sans-serif; text-align:center;">');
        win.document.write('<h2>🌿 شاهي وليف</h2><hr>');
        s.items.forEach(i => win.document.write('<p>' + i.name + ' x' + i.qty + ' = ' + (i.price * i.qty).toFixed(2) + '</p>'));
        win.document.write('<hr><b>الإجمالي: ' + parseFloat(s.total).toFixed(2) + ' ﷼</b></div>');
        win.print();
        win.close();
    }

    function generateReport() {
        const today = new Date().toDateString();
        const summary = {};
        allSales.forEach(s => {
            if(new Date(s.timestamp).toDateString() === today) {
                s.items.forEach(i => {
                    if(!summary[i.name]) summary[i.name] = { q: 0, v: 0 };
                    summary[i.name].q += i.qty;
                    summary[i.name].v += (i.price * i.qty);
                });
            }
        });
        let html = '<table style="width:100%;"><tr><th>الصنف</th><th>الكمية</th><th>المبلغ</th></tr>';
        for(let key in summary) {
            html += `<tr><td>${key}</td><td>${summary[key].q}</td><td>${summary[key].v.toFixed(2)}</td></tr>`;
        }
        document.getElementById('reportArea').innerHTML = html + '</table>';
        document.getElementById('reportModal').style.display = 'flex';
    }
</script>
</body>
</html>
