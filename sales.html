<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #5a0000; --gold: #d4af37; --bg: #f4f4f2; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; margin: 0; direction: rtl; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; }
        .btn-main { background: var(--maroon); color: white; }
        .btn-print { background: #444; color: white; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--maroon); border-bottom: 3px solid var(--maroon); }

        .section { display: none; }
        .section.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background: #f8f9fa; padding: 12px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* ستايل الفاتورة الحرارية المخفية */
        #thermal-receipt { display: none; width: 80mm; padding: 10px; font-family: monospace; }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header no-print">
        <h2 style="margin:0; color:var(--maroon);">📊 نظام التقارير والفواتير</h2>
        <a href="pos.html" class="btn btn-main">⬅ الكاشير</a>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="showTab('sales-tab', this)">سجل العمليات</button>
        <button class="tab-btn" onclick="showTab('monthly-tab', this)">تقرير الأصناف الشهري</button>
    </div>

    <!-- قسم سجل العمليات -->
    <div id="sales-tab" class="section active">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>الأصناف</th>
                    <th>الإجمالي</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="salesTable"></tbody>
        </table>
    </div>

    <!-- قسم التقرير الشهري -->
    <div id="monthly-tab" class="section">
        <h3 id="monthTitle">تقرير شهر: </h3>
        <table>
            <thead>
                <tr>
                    <th>اسم الصنف</th>
                    <th>الكمية المباعة</th>
                    <th>سعر الحبة (متوسط)</th>
                    <th>إجمالي المبيعات</th>
                </tr>
            </thead>
            <tbody id="monthlyTable"></tbody>
        </table>
    </div>
</div>

<!-- قالب الفاتورة الحرارية المخفي -->
<div id="thermal-receipt"></div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSalesData = [];

    // جلب البيانات
    db.ref('sales').on('value', snap => {
        const data = snap.val();
        if (!data) return;
        allSalesData = Object.keys(data).map(id => ({ id, ...data[id] }));
        renderSales();
        renderMonthlyReport();
    });

    // تبديل التبويبات
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // عرض سجل المبيعات
    function renderSales() {
        const tbody = document.getElementById('salesTable');
        const sorted = [...allSalesData].sort((a,b) => b.timestamp - a.timestamp);
        
        tbody.innerHTML = sorted.map(s => `
            <tr>
                <td>${new Date(s.timestamp).toLocaleString('ar-SA')}</td>
                <td style="font-size:12px">${s.items.map(i => i.name).join('، ')}</td>
                <td><b>${parseFloat(s.total).toFixed(2)} ﷼</b></td>
                <td><button class="btn btn-print" onclick="reprintReceipt('${s.id}')">🖨️ إعادة طباعة</button></td>
            </tr>
        `).join('');
    }

    // عرض التقرير الشهري للأصناف
    function renderMonthlyReport() {
        const currentMonth = new Date().getMonth();
        const currentYear = new Date().getFullYear();
        document.getElementById('monthTitle').innerText = `تقرير شهر: ${currentMonth + 1} / ${currentYear}`;

        const itemSummary = {};

        allSalesData.forEach(sale => {
            const saleDate = new Date(sale.timestamp);
            if(saleDate.getMonth() === currentMonth && saleDate.getFullYear() === currentYear) {
                sale.items.forEach(item => {
                    if(!itemSummary[item.name]) {
                        itemSummary[item.name] = { qty: 0, total: 0, price: item.price };
                    }
                    itemSummary[item.name].qty += parseInt(item.q);
                    itemSummary[item.name].total += (item.price * item.q);
                });
            }
        });

        const tbody = document.getElementById('monthlyTable');
        tbody.innerHTML = Object.keys(itemSummary).map(name => `
            <tr>
                <td>${name}</td>
                <td>${itemSummary[name].qty}</td>
                <td>${parseFloat(itemSummary[name].price).toFixed(2)} ﷼</td>
                <td><b>${itemSummary[name].total.toFixed(2)} ﷼</b></td>
            </tr>
        `).join('');
    }

    // وظيفة إعادة الطباعة
    function reprintReceipt(saleId) {
        const sale = allSalesData.find(s => s.id === saleId);
        if(!sale) return;

        const receiptDiv = document.getElementById('thermal-receipt');
        const itemsHtml = sale.items.map(i => `
            <div style="display:flex; justify-content:space-between;">
                <span>${i.name} x${i.q}</span>
                <span>${(i.price * i.q).toFixed(2)}</span>
            </div>
        `).join('');

        receiptDiv.innerHTML = `
            <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px;">
                <h3 style="margin:5px;">شاهي وليف</h3>
                <small>${new Date(sale.timestamp).toLocaleString('ar-SA')}</small>
            </div>
            <div style="padding: 10px 0; border-bottom:1px dashed #000;">
                ${itemsHtml}
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; padding-top:10px;">
                <span>الإجمالي (شامل الضريبة):</span>
                <span>${parseFloat(sale.total).toFixed(2)} ﷼</span>
            </div>
            <div style="text-align:center; margin-top:20px;">
                <small>شكراً لزيارتكم</small>
            </div>
        `;

        window.print();
    }
</script>

</body>
</html>
