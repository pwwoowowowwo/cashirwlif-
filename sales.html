<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل مبيعات شاهي وليف - المطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; margin: 0; direction: rtl; }
        
        /* تصميم الحاوية الرئيسية */
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        /* التبويبات */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--maroon); color: white; }

        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-reprint { background: #444; color: white; }
        .btn-back { background: var(--maroon); color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; }

        .section { display: none; }
        .section.active { display: block; }

        /* إعدادات الطباعة الحرارية (80mm) */
        #thermal-print-area { display: none; width: 72mm; font-family: Arial, sans-serif; color: black; line-height: 1.4; }
        .print-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .print-table { width: 100%; font-size: 13px; margin-bottom: 10px; }
        .print-total { border-top: 1px dashed #000; padding-top: 5px; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #thermal-print-area { display: block; position: absolute; left: 0; top: 0; }
            .container { box-shadow: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <h2 style="margin:0; color:var(--maroon);">📊 السجل والتقارير</h2>
        <a href="pos.html" class="btn-back">⬅ كاشير المبيعات</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('sales-list', this)">سجل العمليات</button>
        <button class="tab-btn" onclick="showTab('inventory-report', this)">جرد المبيعات (الكميات)</button>
    </div>

    <!-- تبويب سجل العمليات -->
    <div id="sales-list" class="section active">
        <table>
            <thead>
                <tr>
                    <th>التاريخ/الوقت</th>
                    <th>العميل</th>
                    <th>الأصناف</th>
                    <th>الإجمالي</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="salesTableBody">
                <tr><td colspan="5" style="text-align:center;">جاري تحميل المبيعات...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- تبويب تقرير الكميات -->
    <div id="inventory-report" class="section">
        <h3 style="margin-bottom:15px;">تقرير الكميات المباعة (الشهر الحالي)</h3>
        <table>
            <thead>
                <tr>
                    <th>اسم الصنف</th>
                    <th>الكمية المباعة</th>
                    <th>سعر الحبة</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
        </table>
    </div>
</div>

<!-- المنطقة المخصصة للطباعة الحرارية فقط -->
<div id="thermal-print-area"></div>

<script>
    // إعدادات Firebase
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSales = [];

    // التبديل بين التبويبات
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // جلب البيانات من Firebase
    db.ref('sales').on('value', snap => {
        const data = snap.val();
        if (!data) {
            document.getElementById('salesTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد مبيعات</td></tr>';
            return;
        }
        
        allSales = Object.keys(data).map(id => ({ id, ...data[id] }));
        allSales.sort((a, b) => b.timestamp - a.timestamp); // الأحدث أولاً
        
        renderSales();
        renderInventory();
    });

    // عرض سجل المبيعات
    function renderSales() {
        const tbody = document.getElementById('salesTableBody');
        tbody.innerHTML = allSales.map(s => {
            const dateStr = new Date(s.timestamp).toLocaleString('ar-SA', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
            const itemsShort = s.items ? s.items.map(i => `${i.name} (x${i.q})`).join('، ') : '---';
            
            return `
                <tr>
                    <td>${dateStr}</td>
                    <td>${s.phone || 'عميل محلي'}</td>
                    <td style="font-size:12px; max-width:250px;">${itemsShort}</td>
                    <td style="font-weight:bold;">${parseFloat(s.total).toFixed(2)} ﷼</td>
                    <td><button class="btn btn-reprint" onclick="prepareReprint('${s.id}')">🖨️ إعادة طباعة</button></td>
                </tr>
            `;
        }).join('');
    }

    // عرض تقرير الكميات (الجرد)
    function renderInventory() {
        const tbody = document.getElementById('inventoryTableBody');
        const summary = {};
        const currentMonth = new Date().getMonth();

        allSales.forEach(sale => {
            const saleDate = new Date(sale.timestamp);
            if(saleDate.getMonth() === currentMonth) {
                sale.items.forEach(item => {
                    if(!summary[item.name]) summary[item.name] = { qty: 0, price: item.price, total: 0 };
                    summary[item.name].qty += parseInt(item.q);
                    summary[item.name].total += (item.price * item.q);
                });
            }
        });

        tbody.innerHTML = Object.keys(summary).map(name => `
            <tr>
                <td><b>${name}</b></td>
                <td>${summary[name].qty}</td>
                <td>${parseFloat(summary[name].price).toFixed(2)} ﷼</td>
                <td style="font-weight:bold; color:var(--maroon);">${summary[name].total.toFixed(2)} ﷼</td>
            </tr>
        `).join('');
    }

    // تجهيز وإعادة طباعة الفاتورة بمقاس 80mm
    function prepareReprint(orderId) {
        const order = allSales.find(o => o.id === orderId);
        if(!order) return;

        const printArea = document.getElementById('thermal-print-area');
        const dateStr = new Date(order.timestamp).toLocaleString('ar-SA');
        
        const itemsHtml = order.items.map(i => `
            <tr>
                <td style="padding:4px 0;">${i.name} <br> <small>${i.q} x ${parseFloat(i.price).toFixed(2)}</small></td>
                <td style="text-align:left; vertical-align:bottom;">${(i.q * i.price).toFixed(2)}</td>
            </tr>
        `).join('');

        printArea.innerHTML = `
            <div class="print-header">
                <h2 style="margin:5px 0;">🍃 شاهي وليف</h2>
                <div style="font-size:12px;">فاتورة ضريبية مبسطة (نسخة)</div>
                <div style="font-size:12px;"> المدينة المنورة:حمراء الاسد - حي ورقان</div>
                <div style="font-size:12px;">جوال رقم /0500000000</div>
                <div style="font-size:11px;">${dateStr}</div>
            </div>
            
            <div style="font-size:12px; margin-bottom:10px;">
                العميل: ${order.phone || 'عميل محلي'}<br>
                طريقة الدفع: ${order.method}
            </div>

            <table class="print-table">
                <thead>
                    <tr style="border-bottom:1px solid #000;">
                        <th style="text-align:right;">الصنف</th>
                        <th style="text-align:left;">المجموع</th>
                    </tr>
                </thead>
                <tbody>${itemsHtml}</tbody>
            </table>

            <div class="print-total">
                <span>الإجمالي:</span>
                <span>${parseFloat(order.total).toFixed(2)} ﷼</span>
            </div>

            <div style="text-align:center; margin-top:15px; font-size:11px;">
                شكراً لزيارتكم نتشرف بخدمتكم دائماً 🍃
            </div>
            <div style="height:50px;"></div>
        `;

        // استدعاء نافذة الطباعة
        window.print();
    }
</script>

</body>
</html>
