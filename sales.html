<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات مبيعات شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; --success: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back { background: #555; color: white; }
        .btn-gold { background: var(--maroon); color: white; }
        .btn-gold:hover { background: #4a0000; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 12px; border-top: 5px solid var(--gold); text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .stat-card span { color: #666; font-size: 14px; font-weight: bold; }
        .stat-card b { font-size: 24px; color: var(--maroon); display: block; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #fdfaf4; padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); color: var(--maroon); }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        
        .payment-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .cash { background: #e8f5e9; color: #2e7d32; }
        .card { background: #e3f2fd; color: #1565c0; }

        .reprint-btn { background: white; color: var(--maroon); border: 1px solid var(--maroon); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .reprint-btn:hover { background: var(--maroon); color: white; }

        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 95%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .container { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar no-print">
        <div style="display:flex; gap:10px;">
            <a href="pos.html" class="btn btn-back">⬅ شاشة الكاشير</a>
            <button class="btn btn-gold" onclick="generateReport()">📊 جرد مبيعات اليوم</button>
        </div>
        <h2 style="color:var(--maroon); margin:0;">📈 سجل العمليات</h2>
    </div>

    <div class="stats-row no-print">
        <div class="stat-card"><span>إجمالي دخل اليوم</span><br><b id="dayTotal">0.00</b></div>
        <div class="stat-card"><span>عدد الطلبات</span><br><b id="dayOrders">0</b></div>
        <div class="stat-card"><span>ضريبة القيمة المضافة</span><br><b id="dayTax">0.00</b></div>
        <div class="stat-card"><span>متوسط الطلب</span><br><b id="dayAvg">0.00</b></div>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>نوع الدفع</th>
                    <th>الأصناف المباعة</th>
                    <th>الإجمالي</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="salesTableBody"></tbody>
        </table>
    </div>
</div>

<!-- مودال التقرير -->
<div id="reportModal" class="no-print">
    <div class="modal-content">
        <div id="printableReport">
            <div style="text-align:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--maroon);">🌿 تقرير جرد الأصناف</h2>
                <p id="reportDate" style="color:#666; font-size:13px;"></p>
            </div>
            <hr border="1" style="border-style:dashed;">
            <div id="reportArea"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;" class="no-print">
            <button class="btn btn-gold" style="flex:1; justify-content:center;" onclick="window.print()">🖨 طباعة التقرير</button>
            <button class="btn" style="flex:1; justify-content:center; background:#eee;" onclick="closeModal()">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSales = [];

    // استماع مباشر للمبيعات
    db.ref('sales').on('value', (snap) => {
        const data = snap.val();
        allSales = [];
        if (!data) {
            document.getElementById('salesTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد مبيعات مسجلة</td></tr>';
            return;
        }

        Object.keys(data).forEach(id => allSales.push({ id, ...data[id] }));
        allSales.sort((a,b) => b.timestamp - a.timestamp); // الأحدث أولاً
        
        renderUI();
    });

    function renderUI() {
        const todayStr = new Date().toDateString();
        let total = 0, tax = 0, count = 0;

        const html = allSales.map(s => {
            const date = new Date(s.timestamp);
            const isToday = date.toDateString() === todayStr;
            
            if(isToday) {
                total += parseFloat(s.total);
                // حساب الضريبة (إذا كان السعر شامل الضريبة) -> Total - (Total / 1.15)
                // إذا كان السعر غير شامل -> Total * 0.15
                tax += (parseFloat(s.total) - (parseFloat(s.total) / 1.15)); 
                count++;
            }

            const methodClass = s.method === 'نقدي' ? 'cash' : 'card';

            return `<tr>
                <td><b>${date.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'})}</b></td>
                <td><span class="payment-tag ${methodClass}">${s.method || 'غير محدد'}</span></td>
                <td><small>${s.items.map(i => i.name + ' ×' + i.qty).join('، ')}</small></td>
                <td style="font-weight:bold; color:var(--maroon);">${parseFloat(s.total).toFixed(2)} ﷼</td>
                <td class="no-print">
                    <button class="reprint-btn" onclick="reprint('${s.id}')">🖨 إعادة طباعة</button>
                </td>
            </tr>`;
        }).join('');
        
        document.getElementById('salesTableBody').innerHTML = html;
        document.getElementById('dayTotal').innerText = total.toFixed(2) + " ﷼";
        document.getElementById('dayOrders').innerText = count;
        document.getElementById('dayTax').innerText = tax.toFixed(2) + " ﷼";
        document.getElementById('dayAvg').innerText = count > 0 ? (total/count).toFixed(2) + " ﷼" : "0.00";
    }

    function reprint(id) {
        const s = allSales.find(x => x.id === id);
        const win = window.open('', '', 'width=300,height=600');
        win.document.write(`
            <div dir="rtl" style="font-family:sans-serif; text-align:center; padding:10px;">
                <h3>🌿 شاهي وليف</h3>
                <p style="font-size:12px;">نسخة مكررة من الفاتورة</p>
                <hr>
                <div style="text-align:right; font-size:13px;">
                    ${s.items.map(i => `<p>${i.name} x${i.qty} <span style="float:left;">${(i.price * i.qty).toFixed(2)}</span></p>`).join('')}
                </div>
                <hr>
                <h4>الإجمالي: ${parseFloat(s.total).toFixed(2)} ﷼</h4>
                <p style="font-size:11px;">طريقة الدفع: ${s.method}</p>
                <p style="font-size:10px;">${new Date(s.timestamp).toLocaleString('ar-SA')}</p>
            </div>
        `);
        win.print();
        win.close();
    }

    function generateReport() {
        const todayStr = new Date().toDateString();
        const summary = {};
        let grandTotal = 0;

        allSales.forEach(s => {
            if(new Date(s.timestamp).toDateString() === todayStr) {
                s.items.forEach(i => {
                    if(!summary[i.name]) summary[i.name] = { q: 0, v: 0 };
                    summary[i.name].q += i.qty;
                    summary[i.name].v += (i.price * i.qty);
                    grandTotal += (i.price * i.qty);
                });
            }
        });

        document.getElementById('reportDate').innerText = "تاريخ اليوم: " + new Date().toLocaleDateString('ar-SA');
        
        let html = '<table style="width:100%; border-collapse:collapse; margin-top:10px;">';
        html += '<tr style="background:#eee;"><th>الصنف</th><th>الكمية</th><th>القيمة</th></tr>';
        
        for(let key in summary) {
            html += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:8px 0;">${key}</td>
                <td style="text-align:center;">${summary[key].q}</td>
                <td style="text-align:left;">${summary[key].v.toFixed(2)}</td>
            </tr>`;
        }
        
        html += `<tr style="font-weight:bold; color:var(--maroon); border-top:2px solid #000;">
            <td colspan="2" style="padding-top:10px;">إجمالي مبيعات اليوم</td>
            <td style="text-align:left; padding-top:10px;">${grandTotal.toFixed(2)} ﷼</td>
        </tr></table>`;

        document.getElementById('reportArea').innerHTML = html;
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('reportModal').style.display = 'none';
    }
</script>
</body>
</html>
