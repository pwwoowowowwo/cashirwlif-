<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل مبيعات شاهي وليف - نسخة التابلت</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f8f9fa; --green: #27ae60; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); padding: 20px; margin: 0; direction: rtl; }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        .header h2 { margin: 0; color: var(--maroon); font-size: 32px; font-weight: 900; }

        /* التبويبات بنمط التابلت */
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; background: #f0f0f0; padding: 10px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 18px; transition: 0.3s; color: #666; }
        .tab-btn.active { background: white; color: var(--maroon); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* الجداول المحسنة */
        .table-container { overflow-x: auto; border-radius: 15px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #fafafa; padding: 18px; text-align: right; color: var(--maroon); font-size: 16px; border-bottom: 2px solid #eee; }
        td { padding: 18px; border-bottom: 1px solid #eee; font-size: 15px; color: #444; }
        tr:hover { background: #fdfdfd; }
        
        .btn-reprint { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-reprint:active { transform: scale(0.95); }
        .btn-back { background: var(--maroon); color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; font-size: 16px; }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* إحصائيات سريعة في صفحة السجل */
        .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .m-card { background: #fffcf5; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; }
        .m-card span { font-size: 14px; color: #777; font-weight: bold; }
        .m-card b { display: block; font-size: 24px; color: var(--maroon); margin-top: 5px; }

        /* الطباعة الحرارية */
        #thermal-print-area { display: none; width: 72mm; padding: 10px; font-family: 'Arial', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            #thermal-print-area { display: block; position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <h2>📊 السجل والتقارير الذكية</h2>
        <a href="index.html" class="btn-back">🏠 العودة للرئيسية</a>
    </div>

    <div class="mini-stats">
        <div class="m-card">
            <span>إجمالي مبيعات اليوم</span>
            <b id="statTodaySales">0.00</b>
        </div>
        <div class="m-card">
            <span>عدد طلبات اليوم</span>
            <b id="statTodayCount">0</b>
        </div>
        <div class="m-card">
            <span>الأكثر مبيعاً</span>
            <b id="statTopItem">---</b>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('sales-list', this)">📄 سجل الفواتير</button>
        <button class="tab-btn" onclick="showTab('inventory-report', this)">📦 جرد الأصناف</button>
    </div>

    <!-- سجل الفواتير -->
    <div id="sales-list" class="section active">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الوقت والتاريخ</th>
                        <th>العميل</th>
                        <th>طريقة الدفع</th>
                        <th>الإجمالي</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="salesTableBody">
                    <tr><td colspan="5" style="text-align:center; padding:50px;">جاري جلب البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- جرد الأصناف -->
    <div id="inventory-report" class="section">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>اسم الصنف</th>
                        <th>الكمية المباعة</th>
                        <th>متوسط السعر</th>
                        <th>إجمالي الدخل</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="thermal-print-area"></div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSales = [];

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // جلب البيانات مع فلترة ذكية
    db.ref('sales').on('value', snap => {
        const data = snap.val();
        if (!data) {
            document.getElementById('salesTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد بيانات متاحة</td></tr>';
            return;
        }
        
        allSales = Object.keys(data).map(id => ({ id, ...data[id] }));
        allSales.sort((a, b) => b.timestamp - a.timestamp); // الأحدث فوق
        
        renderSales();
        renderInventory();
        updateQuickStats();
    });

    function updateQuickStats() {
        const today = new Date().toISOString().split('T')[0];
        let todayTotal = 0;
        let todayCount = 0;
        const itemCounts = {};

        allSales.forEach(s => {
            if(s.date === today) {
                todayTotal += parseFloat(s.amount || s.total);
                todayCount++;
                if(s.items) {
                    s.items.forEach(i => {
                        itemCounts[i.name] = (itemCounts[i.name] || 0) + parseInt(i.qty || i.q);
                    });
                }
            }
        });

        document.getElementById('statTodaySales').innerText = todayTotal.toLocaleString('en-US', {minimumFractionDigits:2}) + " ﷼";
        document.getElementById('statTodayCount').innerText = todayCount;
        
        const topItem = Object.keys(itemCounts).reduce((a, b) => itemCounts[a] > itemCounts[b] ? a : b, "---");
        document.getElementById('statTopItem').innerText = topItem;
    }

    function renderSales() {
        const tbody = document.getElementById('salesTableBody');
        tbody.innerHTML = allSales.map(s => `
            <tr>
                <td><b>${s.time || ''}</b> <br> <small>${s.date || ''}</small></td>
                <td>${s.phone || 'عميل محلي'}</td>
                <td><span style="background:#eee; padding:4px 8px; border-radius:5px; font-size:12px;">${s.method || 'نقدي'}</span></td>
                <td style="font-weight:900; color:var(--maroon);">${parseFloat(s.amount || s.total).toFixed(2)} ﷼</td>
                <td><button class="btn-reprint" onclick="reprint('${s.id}')">🖨️ طباعة</button></td>
            </tr>
        `).join('');
    }

    function renderInventory() {
        const tbody = document.getElementById('inventoryTableBody');
        const summary = {};

        allSales.forEach(sale => {
            if(sale.items) {
                sale.items.forEach(item => {
                    if(!summary[item.name]) summary[item.name] = { qty: 0, price: item.price, total: 0 };
                    const q = parseInt(item.qty || item.q);
                    summary[item.name].qty += q;
                    summary[item.name].total += (item.price * q);
                });
            }
        });

        tbody.innerHTML = Object.keys(summary).map(name => `
            <tr>
                <td><b>${name}</b></td>
                <td>${summary[name].qty}</td>
                <td>${parseFloat(summary[name].price).toFixed(2)} ﷼</td>
                <td style="font-weight:bold; color:var(--green);">${summary[name].total.toFixed(2)} ﷼</td>
            </tr>
        `).join('');
    }

    function reprint(orderId) {
        const order = allSales.find(o => o.id === orderId);
        if(!order) return;

        const printArea = document.getElementById('thermal-print-area');
        const itemsHtml = order.items.map(i => `
            <tr>
                <td>${i.name} x${i.qty || i.q}</td>
                <td align="left">${( (i.qty||i.q) * i.price).toFixed(2)}</td>
            </tr>
        `).join('');

        printArea.innerHTML = `
            <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px;">
                <h2 style="margin:0">شاهي وليف 🍃</h2>
                <p style="font-size:12px">فاتورة ضريبية مبسطة (نسخة)</p>
                <p style="font-size:10px">${order.date} | ${order.time}</p>
            </div>
            <table style="width:100%; font-size:13px; margin:10px 0;">
                ${itemsHtml}
            </table>
            <div style="border-top:1px dashed #000; padding-top:5px; font-weight:bold; font-size:16px; display:flex; justify-content:space-between;">
                <span>الإجمالي:</span>
                <span>${parseFloat(order.amount || order.total).toFixed(2)} ريال</span>
            </div>
            <div style="text-align:center; margin-top:20px; font-size:10px;">نتشرف بخدمتكم دائماً</div>
        `;
        window.print();
    }
</script>
</body>
</html>
</html>
