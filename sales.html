<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير شاهي وليف الشاملة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; margin: 0; direction: rtl; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* الهيدر والتبويبات */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .tab-btn.active { color: var(--maroon); border-bottom: 3px solid var(--maroon); }

        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; }
        .btn-main { background: var(--maroon); color: white; }
        .btn-reprint { background: #444; color: white; }

        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .item-row { background: #fffcf5; padding: 4px 8px; border-radius: 4px; margin-bottom: 3px; border-right: 3px solid var(--gold); font-size: 12px; }
        .section { display: none; }
        .section.active { display: block; }

        /* ستايل الطباعة الحرارية (مخفي في الصفحة) */
        #thermal-receipt { display: none; width: 80mm; padding: 10px; font-family: 'Courier New', Courier, monospace; color: black; }
        
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header no-print">
        <h2 style="margin:0; color:var(--maroon);">📊 سجل المبيعات والتقارير</h2>
        <a href="pos.html" class="btn btn-main">⬅ العودة للكاشير</a>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="showTab('daily-tab', this)">سجل العمليات اليومي</button>
        <button class="tab-btn" onclick="showTab('report-tab', this)">تقرير جرد المبيعات</button>
    </div>

    <!-- تبويب سجل العمليات -->
    <div id="daily-tab" class="section active">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>العميل</th>
                    <th>الأصناف</th>
                    <th>الإجمالي</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="salesTable">
                <tr><td colspan="5" style="text-align:center; padding:30px;">جاري جلب البيانات...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- تبويب تقرير الكميات -->
    <div id="report-tab" class="section">
        <h3 style="color:var(--maroon); margin-bottom:15px;">تقرير إجمالي مبيعات الأصناف (الشهر الحالي)</h3>
        <table>
            <thead>
                <tr>
                    <th>اسم الصنف</th>
                    <th>الكمية المباعة</th>
                    <th>سعر الحبة</th>
                    <th>إجمالي مبيعات الصنف</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>
</div>

<!-- قالب الفاتورة الحرارية -->
<div id="thermal-receipt"></div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allSales = [];

    // التبديل بين التبويبات
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // استدعاء البيانات
    db.ref('sales').on('value', snap => {
        const data = snap.val();
        if (!data) return;
        
        allSales = Object.keys(data).map(id => ({ id, ...data[id] }));
        allSales.sort((a, b) => b.timestamp - a.timestamp); // الأحدث أولاً
        
        renderDailySales();
        renderInventoryReport();
    });

    // عرض سجل المبيعات
    function renderDailySales() {
        const tbody = document.getElementById('salesTable');
        tbody.innerHTML = allSales.map(s => {
            const date = new Date(s.timestamp).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
            const itemsHtml = s.items ? s.items.map(i => `<div class="item-row">${i.name} (x${i.q})</div>`).join('') : '---';
            
            return `
                <tr>
                    <td>${date}</td>
                    <td><small>${s.phone || 'عميل محلي'}</small></td>
                    <td>${itemsHtml}</td>
                    <td style="font-weight:bold;">${parseFloat(s.total).toFixed(2)} ﷼</td>
                    <td><button class="btn btn-reprint" onclick="reprint('${s.id}')">🖨️ إعادة طباعة</button></td>
                </tr>
            `;
        }).join('');
    }

    // عرض تقرير جرد الكميات
    function renderInventoryReport() {
        const reportTable = document.getElementById('reportTable');
        const summary = {};
        const currentMonth = new Date().getMonth();

        allSales.forEach(sale => {
            const saleDate = new Date(sale.timestamp);
            if(saleDate.getMonth() === currentMonth) {
                sale.items.forEach(item => {
                    if(!summary[item.name]) {
                        summary[item.name] = { qty: 0, price: item.price, total: 0 };
                    }
                    summary[item.name].qty += parseInt(item.q);
                    summary[item.name].total += (item.price * item.q);
                });
            }
        });

        reportTable.innerHTML = Object.keys(summary).map(name => `
            <tr>
                <td><b>${name}</b></td>
                <td>${summary[name].qty}</td>
                <td>${parseFloat(summary[name].price).toFixed(2)} ﷼</td>
                <td style="font-weight:bold; color:var(--maroon);">${summary[name].total.toFixed(2)} ﷼</td>
            </tr>
        `).join('');
    }

    // وظيفة إعادة الطباعة (فاتورة حرارية)
    function reprint(orderId) {
        const order = allSales.find(o => o.id === orderId);
        if(!order) return;

        const receipt = document.getElementById('thermal-receipt');
        const itemsHtml = order.items.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${i.name} x${i.q}</span>
                <span>${(i.price * i.q).toFixed(2)}</span>
            </div>
        `).join('');

        receipt.innerHTML = `
            <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                <h2 style="margin:5px;">🌿 شاهي وليف</h2>
                <p style="font-size:12px;">فاتورة إعادة طباعة</p>
                <small>${new Date(order.timestamp).toLocaleString('ar-SA')}</small>
            </div>
            <div style="border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                ${itemsHtml}
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:16px;">
                <span>الإجمالي:</span>
                <span>${parseFloat(order.total).toFixed(2)} ﷼</span>
            </div>
            <div style="margin-top:10px; font-size:12px;">
                طريقة الدفع: ${order.method} <br>
                العميل: ${order.phone || '---'}
            </div>
            <div style="text-align:center; margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                <small>شكراً لزيارتكم</small>
            </div>
        `;

        window.print();
    }
</script>

</body>
</html>
