```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- تم تعديل viewport للسماح بتكبير وتصغير الشاشة بالأصابع -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كاشير شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 50px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        .menu-side { flex: 1.4; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; }
        
        .category-bar { 
            display: flex; 
            gap: 10px; 
            padding: 12px; 
            overflow-x: auto; 
            background: #fff; 
            border-bottom: 2px solid #eee; 
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            padding: 12px 24px; 
            border-radius: 10px; 
            border: 2px solid #f0f0f0; 
            background: #f8f8f8; 
            font-weight: bold; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.2s ease;
            color: #555;
            font-size: 15px;
        }
        
        .cat-btn.active { 
            background: var(--maroon); 
            color: white; 
            border-color: var(--maroon);
            box-shadow: 0 4px 8px rgba(99, 0, 0, 0.2);
        }
        
        .items-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; 
            padding: 15px; 
            overflow-y: auto; 
            align-content: start; 
        }
        
        .item-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 20px 8px; 
            border: 1px solid #eee; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.1s;
        }
        .item-card:active { transform: scale(0.95); }

        .stock-tag { display: none; }

        .cart-side { flex: 0.8; display: flex; flex-direction: column; background: #fff; padding: 15px; min-width: 300px; border-right: 1px solid #eee; }
        
        /* تقليل طول منطقة عناصر السلة بنسبة 20% إضافية لتصبح أكثر رشاقة */
        .cart-items { height: 25%; overflow-y: auto; margin-bottom: 10px; border: 1px solid #f9f9f9; border-radius: 10px; }
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; border-bottom: 1px solid #f5f5f5; font-weight: bold; font-size: 13px; }
        
        .cart-footer { background: #fffcf5; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .total-line { display: flex; justify-content: space-between; font-weight: 900; color: var(--maroon); font-size: 20px; border-top: 2px solid #e0d5b5; padding-top: 10px; margin-top: 8px; }
        
        .btn-pay { width: 100%; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }
        
        .method-btn { padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: bold; }
        .method-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
        
        #offlineAlert { display: none; background: #ff9800; color: white; text-align: center; font-size: 12px; padding: 5px; }
    </style>
</head>
<body>
    <div id="offlineAlert">⚠️ يعمل في وضع الأوفلاين - سيتم التحديث فور الاتصال</div>
    
    <header>
        <button onclick="location.href='inventory.html'" style="background:var(--gold); border:none; color:white; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">📦 إدارة المخزن</button>
        <h2 style="font-size: 18px;">🌿 شاهي وليف</h2>
        <div style="width:100px"></div>
    </header>

    <div class="main-layout">
        <div class="menu-side">
            <div class="category-bar" id="categoryBar">
                <button class="cat-btn active" onclick="changeCategory('tea', this)">شاي</button>
                <button class="cat-btn" onclick="changeCategory('karak', this)">كرك</button>
                <button class="cat-btn" onclick="changeCategory('bakery', this)">مخبوزات</button>
                <button class="cat-btn" onclick="changeCategory('extras', this)">إضافات</button>
                <button class="cat-btn" onclick="changeCategory('games', this)">الطلبات الجانبية</button>
            </div>
            
            <div id="itemsGrid" class="items-grid"></div>
        </div>

        <div class="cart-side">
            <h3 style="margin-bottom:10px; color:var(--maroon); font-size: 16px;">🛒 السلة</h3>
            <div id="cartList" class="cart-items"></div>
            
            <div class="cart-footer">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size: 14px;"><span>المجموع المبدئي:</span><span id="subTotal">0.00</span></div>
                <div style="display:flex; justify-content:space-between; font-size: 14px;"><span>الضريبة (15%):</span><span id="taxAmount">0.00</span></div>
                <div class="total-line"><span>الإجمالي:</span><span><span id="grandTotal">0.00</span> ﷼</span></div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-top:15px;">
                    <button class="method-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                    <button class="method-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                    <button class="method-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
                </div>
                
                <button class="btn-pay" onclick="finishOrder()">إتمام وطلب 🧾</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let currentCat = 'tea'; 
        let cart = [];
        let payMethod = 'نقدي';

        db.ref('.info/connected').on('value', snap => {
            document.getElementById('offlineAlert').style.display = snap.val() ? 'none' : 'block';
        });

        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            renderItems(); 
        });

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const filtered = allProducts.filter(p => p.cat === currentCat);
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#aaa;">لا يوجد أصناف</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const price = parseFloat(p.price) || 0;
                return `
                <div class="item-card" onclick="addToCart('${p.id}', '${p.name}', ${price})">
                    <div style="font-weight:bold; margin-top:5px; min-height:35px; font-size:14px;">${p.name}</div>
                    <div style="color:var(--maroon); font-weight:900; margin-top:5px;">${price.toFixed(2)} ﷼</div>
                </div>`;
            }).join('');
        }

        // إضافة العناصر بغض النظر عن المخزون
        function addToCart(id, name, price) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty++;
            } else {
                cart.push({id, name, price, qty: 1});
            }
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            let sub = 0;
            
            if (cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#ccc; margin-top:20px; font-size:12px;">السلة فارغة</p>`;
            } else {
                list.innerHTML = cart.map((item, idx) => {
                    const lineTotal = item.price * item.qty;
                    sub += lineTotal;
                    return `
                    <div class="cart-row">
                        <span onclick="removeItem(${idx})" style="color:#ff4444; cursor:pointer;">✕</span>
                        <span style="flex:1; margin:0 10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.name} (x${item.qty})</span>
                        <span>${lineTotal.toFixed(2)}</span>
                    </div>`;
                }).join('');
            }
            
            const tax = sub * 0.15;
            document.getElementById('subTotal').innerText = sub.toFixed(2);
            document.getElementById('taxAmount').innerText = tax.toFixed(2);
            document.getElementById('grandTotal').innerText = (sub + tax).toFixed(2);
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function setPayMethod(m, btn) {
            payMethod = m;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function finishOrder() {
            if (cart.length === 0) return;
            
            const updates = {};
            cart.forEach(item => {
                const p = allProducts.find(prod => prod.id === item.id);
                // يتم خصم الكمية من المخزون الموجود حتى لو بالسالب
                if (p) updates[`/products/${item.id}/stock`] = (p.stock || 0) - item.qty;
            });

            try {
                await db.ref().update(updates);
                await db.ref('sales').push({
                    items: cart,
                    total: document.getElementById('grandTotal').innerText,
                    method: payMethod,
                    timestamp: Date.now()
                });
                alert("تم إتمام الطلب بنجاح! ✅");
                cart = [];
                updateCart();
            } catch (err) {
                alert("خطأ في تحديث البيانات!");
            }
        }
    </script>
</body>
</html>
