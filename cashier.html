<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف - المطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 50px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }
        .nav-btn { background: var(--gold); border: none; padding: 6px 12px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 12px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        /* قائمة الأصناف */
        .menu-side { flex: 2; display: flex; flex-direction: column; overflow: hidden; }
        .category-bar { display: flex; gap: 8px; padding-bottom: 10px; overflow-x: auto; flex-shrink: 0; }
        .cat-btn { padding: 10px 18px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .cat-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
        
        .items-scroll-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .item-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
        .item-card:active { transform: scale(0.95); background: #fffcf0; }

        /* السلة المحسنة بالتمرير */
        .cart-side { flex: 1.5; background: white; border-radius: 20px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .cart-items-scroll { flex: 1; overflow-y: auto; margin: 5px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding-right: 5px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: bold; }
        .remove-btn { color: #ff4444; cursor: pointer; font-weight: bold; border: none; background: #fff1f1; border-radius: 50%; width: 24px; height: 24px; line-height: 22px; text-align: center; }

        /* الأزرار والملخص الثابت */
        .cart-footer { flex-shrink: 0; padding-top: 5px; }
        #mixedZone { display: none; background: #e3f2fd; padding: 10px; border-radius: 10px; border: 1px solid #bbdefb; margin-bottom: 8px; }
        .summary-box { background: #fffcf0; padding: 12px; border-radius: 10px; border: 1px dashed var(--gold); margin-bottom: 10px; }
        .summary-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; color: #555; }
        .total-line { display: flex; justify-content: space-between; font-weight: 800; color: var(--maroon); font-size: 20px; border-top: 1px solid #eee; padding-top: 5px; margin-top: 5px; }
        
        .payment-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .pay-btn { padding: 10px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        .pay-btn.active { background: #2e7d32; color: white; border-color: #2e7d32; }
        .btn-pay-final { width: 100%; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-pay-final:hover { background: #1b5e20; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<header>
    <div class="header-btns">
        <button class="nav-btn" onclick="location.href='index.html'">↩ الرئيسية</button>
        <button class="nav-btn" style="background:#444;" onclick="window.print()">🔍 فحص الطابعة</button>
    </div>
    <span style="font-weight: bold; font-size: 18px;">🌿 شاهي وليف | الكاشير المطور</span>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('addons', this)">إضافات</button> <!-- قسم الإضافات الجديد هنا -->
            <button class="cat-btn" onclick="filterCat('games', this)">ألعاب</button>
        </div>
        
        <div class="items-scroll-area">
            <div id="itemsGrid" class="items-grid"></div>
        </div>
    </div>

    <div class="cart-side">
        <input type="tel" id="custPhone" class="no-print" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:8px;" placeholder="رقم جوال العميل (اختياري)">
        
        <div class="cart-items-scroll" id="cartList">
            <p style="text-align:center; color:#ccc; padding-top:30px;">السلة فارغة</p>
        </div>

        <div class="cart-footer">
            <div id="mixedZone" class="no-print">
                <input type="number" id="cashInput" style="width:100%; padding:10px; border-radius:8px; border:1px solid #90caf9; text-align:center; font-weight:bold;" placeholder="المبلغ النقدي" oninput="calculateMixed()">
                <div style="font-size: 12px; margin-top:5px; display:flex; justify-content:space-between; color:#555;">
                    <span>المتبقي للشبكة:</span><b id="cardAmount">0.00</b>
                </div>
            </div>

            <div class="summary-box">
                <div class="summary-line"><span>قبل الضريبة:</span><span><span id="subTotal">0.00</span> ﷼</span></div>
                <div class="summary-line"><span>الضريبة (15%):</span><span><span id="taxAmount">0.00</span> ﷼</span></div>
                <div class="total-line"><span>الإجمالي النهائي:</span><span><span id="grandTotal">0.00</span> ﷼</span></div>
            </div>

            <div class="payment-grid no-print">
                <button class="pay-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                <button class="pay-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                <button class="pay-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
            </div>
            <button class="btn-pay-final no-print" onclick="completeSale()">إتمام و طباعة ✅</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [], selectedMethod = "نقدي", currentCat = 'tea';

    function syncProducts() {
        db.ref('products').on('value', (s) => {
            const data = s.val();
            window.allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            filterCat(currentCat, document.querySelector('.cat-btn.active'));
        });
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // يعرض المنتجات بناءً على التصنيف المختار (بما في ذلك الإضافات إذا تم اختيار قسمها)
        const items = (window.allProducts || []).filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = items.map(p => `
            <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                <div style="color:var(--gold); font-size:12px; margin-top:5px;">${p.price.toFixed(2)} ﷼</div>
            </div>`).join('');
    }

    function addToCart(name, price) {
        const item = cart.find(i => i.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        renderCart();
        if(selectedMethod === 'مختلط') calculateMixed();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
        if(selectedMethod === 'مختلط') calculateMixed();
    }

    function renderCart() {
        let total = 0;
        const list = document.getElementById('cartList');
        if (cart.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#ccc; padding-top:30px;">السلة فارغة</p>';
        } else {
            list.innerHTML = cart.map((item, index) => {
                total += (item.price * item.qty);
                return `
                <div class="cart-row">
                    <button class="remove-btn" onclick="removeFromCart(${index})">✕</button>
                    <span style="flex:1; margin-right:8px;">${item.name} (x${item.qty})</span>
                    <span>${(item.price * item.qty).toFixed(2)}</span>
                </div>`;
            }).join('');
        }
        
        let sub = total / 1.15;
        let tax = total - sub;
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('taxAmount').innerText = tax.toFixed(2);
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        list.scrollTop = list.scrollHeight;
    }

    function setPayMethod(m, btn) {
        selectedMethod = m;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mixedZone').style.display = (m === 'مختلط') ? 'block' : 'none';
        if(m === 'مختلط') calculateMixed();
    }

    function calculateMixed() {
        const total = parseFloat(document.getElementById('grandTotal').innerText) || 0;
        const cash = parseFloat(document.getElementById('cashInput').value) || 0;
        document.getElementById('cardAmount').innerText = Math.max(0, total - cash).toFixed(2);
    }

    function completeSale() {
        if(cart.length === 0) return alert("السلة فارغة!");
        db.ref('sales').push({ 
            total: document.getElementById('grandTotal').innerText, 
            payment: selectedMethod, 
            items: cart, 
            timestamp: firebase.database.ServerValue.TIMESTAMP 
        }).then(() => { 
            window.print(); 
            cart = []; 
            document.getElementById('cashInput').value = "";
            renderCart(); 
        });
    }

    window.onload = syncProducts;
</script>
</body>
</html>
