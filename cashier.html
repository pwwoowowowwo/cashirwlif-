<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كاشير شاي وليف - المحرك المطور المعتمد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; --green: #2e7d32; --orange: #e67e22; --red: #c0392b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 60px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 8px; border: 1px solid #fff; }
        .online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .offline { background: #e74c3c; box-shadow: 0 0 5px #e74c3c; }

        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }
        
        /* الجهة اليمنى: الأصناف */
        .menu-side { flex: 1.4; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; overflow: hidden; }
        .category-bar { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: #fff; border-bottom: 2px solid #eee; flex-shrink: 0; scrollbar-width: none; }
        .cat-btn { padding: 12px 24px; border-radius: 10px; border: 2px solid #f0f0f0; background: #f8f8f8; font-weight: bold; cursor: pointer; white-space: nowrap; color: #555; }
        .cat-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 15px; overflow-y: auto; align-content: start; flex: 1; }
        .item-card { background: #fff; border-radius: 12px; padding: 20px 8px; border: 1px solid #eee; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.05s ease; }
        .item-card:active { transform: scale(0.96); }

        /* الجهة اليسرى: السلة والدفع بنفس الهوية */
        .cart-side { flex: 0.8; display: flex; flex-direction: column; background: #fff; padding: 10px; min-width: 350px; border-right: 1px solid #eee; height: 100%; }
        
        .payment-top-section {
            background: #fffdf5; 
            padding: 15px; 
            border-radius: 20px; 
            border: 2px solid #e0d5b5; 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .summary-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0d5b5; padding-bottom: 10px; }
        .total-label { font-size: 34px; font-weight: 900; color: var(--maroon); line-height: 1; }
        .tax-details { text-align: right; color: #555; font-size: 14px; font-weight: bold; }

        .payment-methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .method-btn { 
            height: 55px; border-radius: 12px; border: 2px solid #ddd; background: white; 
            cursor: pointer; font-weight: 900; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .method-btn.active { border-color: var(--maroon); color: var(--maroon); background: #fff; }
        .method-btn.cash.active { background: var(--maroon); color: white; border-color: var(--maroon); }

        .btn-pay-final { 
            width: 100%; background: var(--green); color: white; padding: 15px; border: none; 
            border-radius: 15px; font-weight: 900; font-size: 22px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* شريط العمليات الإدارية المدمج أسفل الدفع مباشرة */
        .quick-actions-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 2px; }
        .action-mini-btn { padding: 8px 4px; font-size: 13px; font-weight: bold; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; background: white; color: #444; }
        .action-mini-btn.btn-hold { border-color: var(--orange); color: var(--orange); }
        .action-mini-btn.btn-hold.active-hold { background: var(--orange); color: white; }
        .action-mini-btn.btn-refund { border-color: var(--red); color: var(--red); }
        .action-mini-btn.btn-cancel { border-color: #7f8c8d; color: #7f8c8d; }

        .cart-bottom-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid #eee; padding-top: 10px; }
        .cart-items-wrapper { flex: 1; overflow-y: auto; background: #fcfcfc; border-radius: 15px; border: 1px solid #f0f0f0; }
        
        /* تصميم صف السلة الحالي مع زر الحذف السريع ✕ الأصلي */
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f5f5f5; font-weight: bold; font-size: 14px; }
        .cart-row span:first-child { color: #e74c3c; cursor: pointer; font-weight: 900; padding: 0 10px; }

        #mixedModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .modal-body input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--gold); border-radius: 8px; font-size: 18px; text-align: center; }

        /* ======================================================= */
        /* 🖨️ كود وتنسيقات الطباعة (محفوظة دون تعديل)             */
        /* ======================================================= */
        #printArea { display: none; }

        @media print {
            @page { size: 80mm auto; margin: 0mm; }
            body * { display: none !important; } 
            #printArea, #printArea * { display: block !important; } 
            #printArea .p-row, #printArea .p-table-header, #printArea .p-table-row { display: flex !important; }
            
            #printArea { 
                background: white !important; 
                width: 72mm; 
                padding: 1mm 1mm 3mm 1mm; 
                box-sizing: border-box; 
                direction: rtl;
                color: #000 !important;
            }
            
            .receipt-header { text-align: center; margin-bottom: 2px; }
            .receipt-title { font-size: 16px; font-weight: bold; color: #000; margin-bottom: 2px; }
            .p-divider { border-top: 1px dotted #000 !important; margin: 4px 0; height: 0; width: 100%; }
            .p-row { display: flex; justify-content: space-between; font-size: 11px; margin: 2px 0; font-weight: bold; color: #000; }
            .p-table-header { font-weight: bold; border-bottom: none; padding-bottom: 2px; }
            .p-table-row { padding: 3px 0; vertical-align: middle; }
            
            .col-name { text-align: right; width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .col-qty { text-align: center; width: 20%; white-space: nowrap; }
            .col-total { text-align: left; width: 30%; white-space: nowrap; }

            .total-section { margin-top: 2px; }
            .total-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: #000; margin-top: 2px; padding: 1px 0; }
            .footer { text-align: center; font-size: 10px; color: #000; margin-top: 5px; line-height: 1.3; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-btns">
            <a href="index.html" class="nav-btn">🔙 خروج</a>
            <a href="inventory.html" class="nav-btn">📦 المخزن</a>
            <a href="sales.html" class="nav-btn">📊 السجل</a>
        </div>
        <h2><span id="netStatus" class="status-dot online"></span> 🌿 شاي وليف</h2>
        <div style="width:40px"></div>
    </header>

    <div class="main-layout">
        <div class="menu-side">
            <div class="category-bar" id="categoryBar">
                <button class="cat-btn active" onclick="changeCategory('tea', this)">شاي</button>
                <button class="cat-btn" onclick="changeCategory('karak', this)">كرك</button>
                <button class="cat-btn" onclick="changeCategory('bakery', this)">مخبوزات</button>
                <button class="cat-btn" onclick="changeCategory('extras', this)">إضافات</button>
                <button class="cat-btn" onclick="changeCategory('games', this)">طلبات جانبية</button>
            </div>
            <div id="itemsGrid" class="items-grid"></div>
        </div>

        <div class="cart-side">
            <div class="payment-top-section">
                <div class="summary-header">
                    <div class="total-label"><span id="grandTotal">0.00</span> ﷼</div>
                    <div class="tax-details">
                        <div style="color:black; font-size: 16px;">الإجمالي</div>
                        <div>الضريبة: <span id="taxAmount">0.00</span></div>
                    </div>
                </div>

                <div class="payment-methods">
                    <button class="method-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
                    <button class="method-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                    <button class="method-btn active cash" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                </div>

                <button class="btn-pay-final" onclick="handlePayment()">
                    <span>🧾</span> إتمام و طباعة
                </button>

                <!-- أزرار الإدارة المضافة تحت الدفع والطباعة -->
                <div class="quick-actions-bar">
                    <button class="action-mini-btn btn-hold" id="holdBtn" onclick="toggleHoldOrder()">⏳ تعليق الفاتورة</button>
                    <button class="action-mini-btn btn-refund" onclick="triggerRefundProcess()">🔄 استرجاع فاتورة</button>
                    <button class="action-mini-btn btn-cancel" onclick="clearCartWithConfirmation()">❌ كنسلة السلة</button>
                </div>
            </div>

            <div class="cart-bottom-section">
                <input type="tel" id="customerPhone" placeholder="رقم الجوال (اختياري)" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;">
                <h4 style="margin-bottom: 5px; color: #666; font-size: 13px;">الأصناف المختارة:</h4>
                <div class="cart-items-wrapper">
                    <div id="cartList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mixedModal">
        <div class="modal-body">
            <h3 style="color:var(--maroon);">دفع مختلط</h3>
            <input type="number" id="cashInput" placeholder="المبلغ النقدي" oninput="calculateSplit()">
            <div style="display:flex; justify-content:space-around; margin:10px 0; font-size:13px;">
                <div>كاش: <b id="splitCash">0.00</b></div>
                <div>شبكة: <b id="splitCard">0.00</b></div>
            </div>
            <button class="btn-pay-final" style="font-size: 18px; padding: 10px;" onclick="confirmMixedPayment()">تأكيد العملية</button>
            <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:grey; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <!-- منطقة الطباعة - لم يتم تعديل أي دالة أو وسم بها -->
    <div id="printArea">
        <div class="receipt-header">
            <div class="receipt-title" id="dispTitle">🌿 شاهي وليف</div>
            <div id="dispHeader" style="white-space: pre-line; font-size: 10px; font-weight: normal; line-height: 1.4;"></div>
        </div>

        <div class="p-divider"></div>
        <div id="orderInfo"></div>
        <div class="p-divider"></div>

        <div class="p-row p-table-header">
            <div class="col-name">الصنف</div>
            <div class="col-qty">العدد</div>
            <div class="col-total">المجموع</div>
        </div>
        
        <div id="itemsList"></div>

        <div class="p-divider"></div>

        <div class="total-section">
            <div id="taxCalculation"></div>
            <div class="p-divider" style="margin: 3px 0;"></div>
            <div class="total-row">
                <span>الإجمالي الشامل:</span>
                <span id="grandTotalMuted">0.00 ﷼</span>
            </div>
            <div id="paymentDetails" style="font-size: 10.5px; margin-top: 3px; font-weight: bold;"></div>
        </div>

        <div class="p-divider"></div>

        <div class="footer">
            <div id="dispFooter" style="white-space: pre-line; font-weight: bold; font-size: 9.5px;"></div>
            <div style="margin-top: 4px; font-weight: bold; font-size: 8.5px; opacity: 0.7;">نظام شاهي وليف السحابي الموحد</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], cart = [], payMethod = 'نقدي', currentCat = 'tea';
        let heldCart = null; 

        function checkNet() {
            const dot = document.getElementById('netStatus');
            if(navigator.onLine) { dot.className = 'status-dot online'; syncOfflineSales(); } 
            else { dot.className = 'status-dot offline'; }
        }
        window.addEventListener('online', checkNet);
        window.addEventListener('offline', checkNet);

        const cached = localStorage.getItem('local_products');
        if(cached) { allProducts = JSON.parse(cached); renderItems(); }

        db.ref('products').on('value', snap => {
            const data = snap.val();
            if(data) {
                allProducts = Object.keys(data).map(k => ({id: k, ...data[k]}));
                localStorage.setItem('local_products', JSON.stringify(allProducts));
                renderItems(); 
            }
        });

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = allProducts.filter(p => p.cat === currentCat).map(p => `
                <div class="item-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                    <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                    <div style="color:var(--maroon); font-weight:900;">${p.price.toFixed(2)} ﷼</div>
                </div>`).join('');
        }

        function addToCart(id, name, price) {
            const item = cart.find(c => c.id === id);
            if (item) item.qty++; else cart.push({id, name, price, qty: 1});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `<div class="cart-row"><span onclick="removeItem(${idx})">✕</span><span>${item.name} (x${item.qty})</span><span>${(item.price * item.qty).toFixed(2)}</span></div>`;
            }).join('');
            
            const subtotal = total / 1.15;
            const tax = total - subtotal;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('taxAmount').innerText = tax.toFixed(2);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCart(); }

        function setPayMethod(m, btn) {
            payMethod = m;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handlePayment() {
            if (cart.length === 0) return;
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            if (payMethod === 'مختلط') {
                document.getElementById('cashInput').value = "";
                document.getElementById('mixedModal').style.display = 'flex';
                calculateSplit();
            } else {
                processOrder(payMethod, {cash: payMethod === 'نقدي' ? total : 0, card: payMethod === 'شبكة' ? total : 0});
            }
        }

        async function processOrder(method, details) {
            // كود توليد رقم الفاتورة المطور والأنيق (وقت حالي + رقمين عشوائيين) لمنع الطول والتعقيد والتكرار
            const now = new Date();
            const timeString = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
            const randomSuffix = Math.floor(10 + Math.random() * 90); 
            const generatedInvoiceCode = "INV-" + timeString + randomSuffix;

            const order = {
                invoiceId: generatedInvoiceCode,
                items: cart.map(i => ({ name: i.name, q: i.qty, price: i.price, totalItem: (i.qty * i.price).toFixed(2) })),
                total: document.getElementById('grandTotal').innerText,
                tax: document.getElementById('taxAmount').innerText,
                method, paymentDetails: details,
                phone: document.getElementById('customerPhone').value || "عميل سفري",
                timestamp: Date.now()
            };

            let queue = JSON.parse(localStorage.getItem('shahi_offline_queue') || "[]");
            queue.push(order);
            localStorage.setItem('shahi_offline_queue', JSON.stringify(queue));

            if(navigator.onLine) syncOfflineSales();
            
            directPrintReceipt(order);
            
            cart = []; 
            updateCart(); 
            document.getElementById('customerPhone').value = "";
        }

        function toggleHoldOrder() {
            const btn = document.getElementById('holdBtn');
            if (heldCart === null) {
                if (cart.length === 0) { alert("السلة فارغة، لا يوجد شيء لتعليقه!"); return; }
                heldCart = [...cart];
                cart = [];
                updateCart();
                btn.innerText = "⏳ استعادة الفاتورة";
                btn.classList.add('active-hold');
            } else {
                cart = [...heldCart];
                heldCart = null;
                updateCart();
                btn.innerText = "⏳ تعليق الفاتورة";
                btn.classList.remove('active-hold');
            }
        }

        function clearCartWithConfirmation() {
            if (cart.length === 0) return;
            if (confirm("هل أنت متأكد من كنسلة وإلغاء هذه السلة بالكامل؟")) {
                cart = [];
                updateCart();
            }
        }

        async function triggerRefundProcess() {
            const inputInvoiceId = prompt("أدخل رقم الفاتورة المراد استرجاعها وعكس مبيعاتها (مثال: INV-18523088):");
            if (!inputInvoiceId) return;

            if (!navigator.onLine) {
                alert("يجب أن تكون متصلاً بالشبكة حالياً للتمكن من حذف الفاتورة وعكس الجرد من السحابة!");
                return;
            }

            db.ref('sales').orderByChild('invoiceId').equalTo(inputInvoiceId.trim()).once('value', async (snap) => {
                const data = snap.val();
                if (!data) {
                    alert("لم يتم العثور على أي فاتورة مسجلة بهذا الرقم!");
                    return;
                }

                const key = Object.keys(data)[0];
                const invoiceDetails = data[key];

                if (confirm(`تم العثور على الفاتورة بإجمالي: ${invoiceDetails.total} ﷼.\nهل أنت متأكد من حذفها نهائياً وعكس المبيعات؟`)) {
                    try {
                        await db.ref('sales').child(key).remove();
                        alert("تم استرجاع الفاتورة بنجاح وحذف قيمتها من تقارير المبيعات.");
                    } catch (error) {
                        alert("حدث خطأ أثناء الحذف: " + error.message);
                    }
                }
            });
        }

        /* 🧾 دالة بناء بيانات الطباعة الحرارية الأصلية دون تغيير */
        function directPrintReceipt(order) {
            const savedSettings = JSON.parse(localStorage.getItem('receiptSettings')) || {
                title: "🌿 شاهي وليف",
                header: "الرقم الضريبي: 7008227030 \nالفرع: الرئيسي \nالعنوان: المدينة المنورة - ورقان",
                footer: "شكراً لزيارتكم! نتشرف بخدمتكم دائماً 🌱 \nيسعدنا تقديم أفضل شاهي ومخبوزات لكم 🌿"
            };

            document.getElementById('dispTitle').innerText = savedSettings.title;
            document.getElementById('dispHeader').innerText = savedSettings.header;
            document.getElementById('dispFooter').innerText = savedSettings.footer;

            const orderDate = order.timestamp ? new Date(order.timestamp).toLocaleString('ar-SA') : new Date().toLocaleString('ar-SA');
            let totalQty = 0;

            document.getElementById('orderInfo').innerHTML = `
                <div class="p-row"><span>رقم الفاتورة:</span> <span>${order.invoiceId}</span></div>
                <div class="p-row"><span>التاريخ والوقت:</span> <span>${orderDate}</span></div>
                <div class="p-row"><span>رقم العميل:</span> <span>${order.phone}</span></div>
            `;

            document.getElementById('itemsList').innerHTML = order.items.map(item => {
                const qty = parseInt(item.q || 1);
                totalQty += qty;
                return `
                    <div class="p-row p-table-row">
                        <div class="col-name">${item.name}</div>
                        <div class="col-qty">${qty}</div>
                        <div class="col-total">${parseFloat(item.totalItem).toFixed(2)} ﷼</div>
                    </div>
                `;
            }).join('');

            const grandTotalVal = parseFloat(order.total || 0);
            const taxVal = parseFloat(order.tax || 0).toFixed(2);
            const netVal = (grandTotalVal - taxVal).toFixed(2);

            document.getElementById('taxCalculation').innerHTML = `
                <div class="p-row"><span>إجمالي عدد الاصناف:</span> <span>${totalQty} حبة</span></div>
                <div class="p-row"><span>المبلغ الخاضع للضريبة:</span> <span>${netVal} ﷼</span></div>
                <div class="p-row"><span>ضريبة القيمة المضافة (15%):</span> <span>${taxVal} ﷼</span></div>
            `;

            document.getElementById('grandTotalMuted').innerText = grandTotalVal.toFixed(2) + " ﷼";

            let paymentMethodText = `طريقة الدفع: ${order.method}`;
            if (order.paymentDetails) {
                let details = [];
                if(parseFloat(order.paymentDetails.cash) > 0) details.push(`كاش: ${parseFloat(order.paymentDetails.cash).toFixed(2)} ﷼`);
                if(parseFloat(order.paymentDetails.card) > 0) details.push(`شبكة: ${parseFloat(order.paymentDetails.card).toFixed(2)} ﷼`);
                if(details.length > 0) paymentMethodText += ` (${details.join(' + ')})`;
            }
            document.getElementById('paymentDetails').innerText = paymentMethodText;

            setTimeout(() => { window.print(); }, 250);
        }

        async function syncOfflineSales() {
            if(!navigator.onLine) return;
            let queue = JSON.parse(localStorage.getItem('shahi_offline_queue') || "[]");
            if(queue.length === 0) return;
            for(const o of queue) { try { await db.ref('sales').push(o); } catch(e) { break; } }
            localStorage.setItem('shahi_offline_queue', "[]");
        }

        function calculateSplit() {
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const card = Math.max(0, total - cash);
            document.getElementById('splitCash').innerText = cash.toFixed(2);
            document.getElementById('splitCard').innerText = card.toFixed(2);
        }

        function confirmMixedPayment() {
            const cash = parseFloat(document.getElementById('splitCash').innerText);
            const card = parseFloat(document.getElementById('splitCard').innerText);
            processOrder('مختلط', {cash, card});
            closeModal();
        }

        function closeModal() { document.getElementById('mixedModal').style.display = 'none'; }
    </script>
</body>
</html>
