<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كاشير شاهي وليف | واجهة احترافية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 45px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 12px; justify-content: space-between; flex-shrink: 0; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }

        /* منطقة الأصناف */
        .menu-side { flex: 1.5; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; }
        .category-bar { display: flex; gap: 6px; padding: 8px; overflow-x: auto; background: #f9f9f9; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .cat-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .cat-btn.active { background: var(--maroon); color: white; }
        
        .items-scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .item-card { background: #fff; border-radius: 8px; padding: 15px 10px; border: 1px solid #eee; text-align: center; cursor: pointer; transition: 0.2s; }
        .item-card:active { transform: scale(0.95); background: #f0f0f0; }

        /* منطقة السلة المدمجة */
        .cart-side { flex: 0.7; display: flex; flex-direction: column; background: #fff; padding: 10px; height: 100%; border-right: 1px solid #eee; min-width: 260px; }
        .cart-items-scroll { height: 30%; overflow-y: auto; margin: 5px 0; border: 1px solid #f0f0f0; border-radius: 8px; flex-grow: 0; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 6px; border-bottom: 1px solid #f9f9f9; font-weight: bold; font-size: 12px; }
        .remove-btn { color: white; border: none; background: #ff4444; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* قسم الحسابات والدفع */
        .cart-footer { display: flex; flex-direction: column; gap: 5px; }
        .summary-box { background: #fffcf0; padding: 6px; border-radius: 6px; border: 1px dashed var(--gold); font-size: 11px; }
        .tax-line { display: flex; justify-content: space-between; color: #666; margin-bottom: 2px; }
        .total-line { display: flex; justify-content: space-between; font-weight: 800; color: var(--maroon); font-size: 16px; border-top: 1px solid #ddd; padding-top: 3px; }

        .pay-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        .method-btn { padding: 8px 2px; border: 1px solid #ddd; border-radius: 6px; background: #f9f9f9; cursor: pointer; font-weight: bold; font-size: 10px; }
        .method-btn.active { background: var(--maroon); color: white; }
        
        #mixedInputBox { display: none; background: #e3f2fd; padding: 6px; border-radius: 6px; }
        .btn-pay-final { width: 100%; background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<header>
    <button onclick="location.href='index.html'" style="background:var(--gold); border:none; color:white; padding:4px 10px; border-radius:4px; cursor:pointer;">🏠</button>
    <span style="font-size: 14px; font-weight: bold;">🌿 كاشير شاهي وليف</span>
    <button class="no-print" onclick="window.print()" style="background:#444; color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;">🖨️</button>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('addons', this)">إضافات</button>
            <button class="cat-btn" onclick="filterCat('games', this)">ألعاب</button>
        </div>
        <div class="items-scroll-area"><div id="itemsGrid" class="items-grid"></div></div>
    </div>

    <div class="cart-side">
        <div class="cart-items-scroll" id="cartList">
            <p style="text-align:center; color:#ccc; padding:15px; font-size: 11px;">السلة فارغة</p>
        </div>

        <div class="cart-footer">
            <div class="summary-box">
                <div class="tax-line"><span>قبل الضريبة:</span><span><span id="subTotal">0.00</span> ﷼</span></div>
                <div class="tax-line"><span>الضريبة (15%):</span><span><span id="taxAmount">0.00</span> ﷼</span></div>
                <div class="total-line"><span>الإجمالي:</span><span><span id="grandTotal">0.00</span> ﷼</span></div>
            </div>

            <div class="pay-options no-print">
                <button class="method-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                <button class="method-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                <button class="method-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
            </div>

            <div id="mixedInputBox" class="no-print">
                <input type="number" id="cashAmount" oninput="calcMixed()" placeholder="المبلغ الكاش" style="width:100%; padding:5px; font-size:11px; border-radius:4px; border:1px solid #ccc;">
                <div style="font-size: 9px; margin-top:3px; color: #1565c0;">للشبكة: <b id="networkRemaining">0.00</b> ﷼</div>
            </div>

            <button class="btn-pay-final" onclick="completeSale()">إتمام الطلب ✅</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let cart = [], currentMethod = 'نقدي', currentCat = 'tea';

    function syncData() {
        db.ref('products').on('value', (s) => {
            const data = s.val();
            window.allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            filterCat(currentCat, document.querySelector('.cat-btn.active'));
        });
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const items = (window.allProducts || []).filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = items.map(p => `
            <div class="item-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                <b style="font-size:11px; display:block;">${p.name}</b>
                <small style="font-size:9px; color:var(--gold);">${p.price.toFixed(2)} ﷼</small>
            </div>`).join('');
    }

    function addToCart(id, name, price) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty++;
        } else {
            cart.push({ id, name, price, qty: 1 });
        }
        renderCart();
    }

    function renderCart() {
        let sub = 0;
        const list = document.getElementById('cartList');
        if (!cart.length) {
            list.innerHTML = '<p style="text-align:center; color:#ccc; padding:15px; font-size: 11px;">السلة فارغة</p>';
        } else {
            list.innerHTML = cart.map((item, index) => {
                sub += (item.price * item.qty);
                return `<div class="cart-row">
                    <button class="remove-btn" onclick="cart.splice(${index},1);renderCart();">✕</button>
                    <span style="flex:1; margin-right:8px;">${item.name}</span>
                    <span>x${item.qty}</span>
                </div>`;
            }).join('');
        }
        let tax = sub * 0.15;
        let total = sub + tax;
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('taxAmount').innerText = tax.toFixed(2);
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        calcMixed();
    }

    function setPayMethod(method, btn) {
        currentMethod = method;
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mixedInputBox').style.display = (method === 'مختلط') ? 'block' : 'none';
    }

    function calcMixed() {
        const total = parseFloat(document.getElementById('grandTotal').innerText);
        const cash = parseFloat(document.getElementById('cashAmount').value) || 0;
        document.getElementById('networkRemaining').innerText = Math.max(0, total - cash).toFixed(2);
    }

    async function completeSale() {
        if(!cart.length) return;
        const updates = {};
        cart.forEach(item => {
            const p = window.allProducts.find(x => x.id === item.id);
            if(p) {
                // الخصم يتم هنا في الخلفية دون الحاجة لعرض الرقم في الكاشير
                let currentStock = p.stock || p.quantity || 0;
                updates[`/products/${item.id}/stock`] = currentStock - item.qty;
            }
        });
        try {
            await db.ref().update(updates);
            await db.ref('sales').push({ 
                total: document.getElementById('grandTotal').innerText, 
                tax: document.getElementById('taxAmount').innerText,
                payment: currentMethod,
                items: cart, 
                timestamp: Date.now() 
            });
            window.print();
            cart = []; document.getElementById('cashAmount').value = ''; renderCart();
        } catch(e) { alert("خطأ في الشبكة"); }
    }

    window.onload = syncData;
</script>
</body>
</html>
