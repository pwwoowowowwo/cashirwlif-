<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كاشير شاهي وليف - الترتيب الجديد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; --green: #2e7d32; }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 60px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 8px; border: 1px solid #fff; }
        .online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .offline { background: #e74c3c; box-shadow: 0 0 5px #e74c3c; }

        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }
        
        /* الجهة اليمنى: الأصناف */
        .menu-side { flex: 1.4; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; overflow: hidden; }
        .category-bar { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: #fff; border-bottom: 2px solid #eee; flex-shrink: 0; scrollbar-width: none; }
        .cat-btn { padding: 12px 24px; border-radius: 10px; border: 2px solid #f0f0f0; background: #f8f8f8; font-weight: bold; cursor: pointer; white-space: nowrap; color: #555; }
        .cat-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 15px; overflow-y: auto; align-content: start; flex: 1; }
        .item-card { background: #fff; border-radius: 12px; padding: 20px 8px; border: 1px solid #eee; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* الجهة اليسرى: السلة والدفع */
        .cart-side { flex: 0.8; display: flex; flex-direction: column; background: #fff; padding: 10px; min-width: 350px; border-right: 1px solid #eee; height: 100%; }
        
        /* القسم العلوي: الدفع والطباعة والإجمالي (ثابت) */
        .payment-top-section {
            background: #fffdf5; 
            padding: 15px; 
            border-radius: 20px; 
            border: 2px solid #e0d5b5; 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .summary-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0d5b5; padding-bottom: 10px; }
        .total-label { font-size: 34px; font-weight: 900; color: var(--maroon); line-height: 1; }
        .tax-details { text-align: right; color: #555; font-size: 14px; font-weight: bold; }

        .payment-methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .method-btn { 
            height: 55px; border-radius: 12px; border: 2px solid #ddd; background: white; 
            cursor: pointer; font-weight: 900; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .method-btn.active { border-color: var(--maroon); color: var(--maroon); background: #fff; }
        .method-btn.cash.active { background: var(--maroon); color: white; border-color: var(--maroon); }

        .btn-pay-final { 
            width: 100%; background: var(--green); color: white; padding: 15px; border: none; 
            border-radius: 15px; font-weight: 900; font-size: 22px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* القسم السفلي: السلة (قابلة للتمرير) */
        .cart-bottom-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid #eee; padding-top: 10px; }
        .cart-items-wrapper { flex: 1; overflow-y: auto; background: #fcfcfc; border-radius: 15px; border: 1px solid #f0f0f0; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f5f5f5; font-weight: bold; font-size: 14px; }
        .cart-row span:first-child { color: #e74c3c; cursor: pointer; font-weight: 900; padding: 0 10px; }

        #mixedModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .modal-body input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--gold); border-radius: 8px; font-size: 18px; text-align: center; }

        #receipt-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { display: block; position: absolute; left: 0; top: 0; width: 72mm; padding: 5px; direction: rtl; }
        }
    </style>
</head>
<body>

    <header class="no-print">
        <div class="nav-btns">
            <a href="index.html" class="nav-btn">🔙 خروج</a>
            <a href="inventory.html" class="nav-btn">📦 المخزن</a>
            <a href="sales.html" class="nav-btn">📊 السجل</a>
        </div>
        <h2><span id="netStatus" class="status-dot online"></span> 🌿 شاهي وليف</h2>
        <div style="width:40px"></div>
    </header>

    <div class="main-layout no-print">
        <div class="menu-side">
            <div class="category-bar" id="categoryBar">
                <button class="cat-btn active" onclick="changeCategory('tea', this)">شاي</button>
                <button class="cat-btn" onclick="changeCategory('karak', this)">كرك</button>
                <button class="cat-btn" onclick="changeCategory('bakery', this)">مخبوزات</button>
                <button class="cat-btn" onclick="changeCategory('extras', this)">إضافات</button>
                <button class="cat-btn" onclick="changeCategory('games', this)">طلبات جانبية</button>
            </div>
            <div id="itemsGrid" class="items-grid"></div>
        </div>

        <div class="cart-side">
            <div class="payment-top-section">
                <div class="summary-header">
                    <div class="total-label"><span id="grandTotal">0.00</span> ﷼</div>
                    <div class="tax-details">
                        <div style="color:black; font-size: 16px;">الإجمالي</div>
                        <div>الضريبة: <span id="taxAmount">0.00</span></div>
                    </div>
                </div>

                <div class="payment-methods">
                    <button class="method-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
                    <button class="method-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                    <button class="method-btn active cash" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                </div>

                <button class="btn-pay-final" onclick="handlePayment()">
                    <span>🧾</span> إتمام و طباعة
                </button>
            </div>

            <div class="cart-bottom-section">
                <input type="tel" id="customerPhone" placeholder="رقم الجوال (اختياري)" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;">
                <h4 style="margin-bottom: 5px; color: #666; font-size: 13px;">الأصناف المختارة:</h4>
                <div class="cart-items-wrapper">
                    <div id="cartList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mixedModal" class="no-print">
        <div class="modal-body">
            <h3 style="color:var(--maroon);">دفع مختلط</h3>
            <input type="number" id="cashInput" placeholder="المبلغ النقدي" oninput="calculateSplit()">
            <div style="display:flex; justify-content:space-around; margin:10px 0; font-size:13px;">
                <div>كاش: <b id="splitCash">0.00</b></div>
                <div>شبكة: <b id="splitCard">0.00</b></div>
            </div>
            <button class="btn-pay-final" style="font-size: 18px; padding: 10px;" onclick="confirmMixedPayment()">تأكيد العملية</button>
            <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:grey; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="receipt-print"></div>

    <script>
        // ... (نفس السكربت البرمجي الخاص بك للتعامل مع الفايربيز والسلة والطباعة)
        const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], cart = [], payMethod = 'نقدي', currentCat = 'tea';

        function checkNet() {
            const dot = document.getElementById('netStatus');
            if(navigator.onLine) { dot.className = 'status-dot online'; syncOfflineSales(); } 
            else { dot.className = 'status-dot offline'; }
        }
        window.addEventListener('online', checkNet);
        window.addEventListener('offline', checkNet);

        const cached = localStorage.getItem('local_products');
        if(cached) { allProducts = JSON.parse(cached); renderItems(); }

        db.ref('products').on('value', snap => {
            const data = snap.val();
            if(data) {
                allProducts = Object.keys(data).map(k => ({id: k, ...data[k]}));
                localStorage.setItem('local_products', JSON.stringify(allProducts));
                renderItems(); 
            }
        });

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = allProducts.filter(p => p.cat === currentCat).map(p => `
                <div class="item-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                    <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                    <div style="color:var(--maroon); font-weight:900;">${p.price.toFixed(2)} ﷼</div>
                </div>`).join('');
        }

        function addToCart(id, name, price) {
            const item = cart.find(c => c.id === id);
            if (item) item.qty++; else cart.push({id, name, price, qty: 1});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `<div class="cart-row"><span onclick="removeItem(${idx})">✕</span><span>${item.name} (x${item.qty})</span><span>${(item.price * item.qty).toFixed(2)}</span></div>`;
            }).join('');
            
            const subtotal = total / 1.15;
            const tax = total - subtotal;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('taxAmount').innerText = tax.toFixed(2);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCart(); }

        function setPayMethod(m, btn) {
            payMethod = m;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handlePayment() {
            if (cart.length === 0) return;
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            if (payMethod === 'مختلط') {
                document.getElementById('cashInput').value = "";
                document.getElementById('mixedModal').style.display = 'flex';
            } else {
                processOrder(payMethod, {cash: payMethod === 'نقدي' ? total : 0, card: payMethod === 'شبكة' ? total : 0});
            }
        }

        async function processOrder(method, details) {
            const order = {
                items: cart.map(i => ({ name: i.name, q: i.qty, price: i.price, totalItem: (i.qty * i.price).toFixed(2) })),
                total: document.getElementById('grandTotal').innerText,
                tax: document.getElementById('taxAmount').innerText,
                method, paymentDetails: details,
                phone: document.getElementById('customerPhone').value || "عميل محلي",
                timestamp: Date.now()
            };

            let queue = JSON.parse(localStorage.getItem('shahi_offline_queue') || "[]");
            queue.push(order);
            localStorage.setItem('shahi_offline_queue', JSON.stringify(queue));

            if(navigator.onLine) syncOfflineSales();
            printReceipt(order);
            cart = []; updateCart(); document.getElementById('customerPhone').value = "";
        }

        async function syncOfflineSales() {
            if(!navigator.onLine) return;
            let queue = JSON.parse(localStorage.getItem('shahi_offline_queue') || "[]");
            if(queue.length === 0) return;
            for(const o of queue) { try { await db.ref('sales').push(o); } catch(e) { break; } }
            localStorage.setItem('shahi_offline_queue', "[]");
        }

        function calculateSplit() {
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const card = Math.max(0, total - cash);
            document.getElementById('splitCash').innerText = cash.toFixed(2);
            document.getElementById('splitCard').innerText = card.toFixed(2);
        }

        function confirmMixedPayment() {
            const cash = parseFloat(document.getElementById('splitCash').innerText);
            const card = parseFloat(document.getElementById('splitCard').innerText);
            processOrder('مختلط', {cash, card});
            closeModal();
        }

        function closeModal() { document.getElementById('mixedModal').style.display = 'none'; }

        function printReceipt(order) {
            const printDiv = document.getElementById('receipt-print');
            const itemsHtml = order.items.map(i => `<tr><td>${i.name} x${i.q}</td><td align="left">${i.totalItem}</td></tr>`).join('');
            printDiv.innerHTML = `
                <div style="text-align:center;"><h3>🌿 شاهي وليف</h3><p>فاتورة ضريبية مبسطة</p></div>
                <hr>
                <table style="width:100%; font-size:12px;"><tbody>${itemsHtml}</tbody></table>
                <hr>
                <div style="font-weight:bold;">الإجمالي: ${order.total} ريال</div>
                <div style="font-size:10px;">شامل الضريبة: ${order.tax} ريال</div>
            `;
            setTimeout(() => { window.print(); }, 500);
        }
    </script>
</body>
</html>
