<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كاشير شاهي وليف - المطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 60px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; }

        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }
        .menu-side { flex: 1.4; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; overflow: hidden; }
        .category-bar { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: #fff; border-bottom: 2px solid #eee; flex-shrink: 0; scrollbar-width: none; }
        .cat-btn { padding: 12px 24px; border-radius: 10px; border: 2px solid #f0f0f0; background: #f8f8f8; font-weight: bold; cursor: pointer; white-space: nowrap; color: #555; }
        .cat-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 15px; overflow-y: auto; align-content: start; flex: 1; }
        .item-card { background: #fff; border-radius: 12px; padding: 20px 8px; border: 1px solid #eee; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* الجهة اليسرى */
        .cart-side { flex: 0.8; display: flex; flex-direction: column; background: #fff; padding: 15px; min-width: 320px; border-right: 1px solid #eee; height: 100%; }
        
        /* تعديل الطول ليكون 50% تقريباً من المساحة المتاحة للسلة */
        .cart-items { height: 45%; overflow-y: auto; margin: 5px 0; border: 1px solid #f9f9f9; border-radius: 10px; flex-shrink: 0; }
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 8px; border-bottom: 1px solid #f5f5f5; font-weight: bold; font-size: 13px; }
        .cart-row span:first-child { color: #e74c3c; cursor: pointer; padding: 0 5px; font-weight: 900; }
        
        /* تذييل السلة */
        .cart-footer { background: #fffcf5; padding: 10px; border-radius: 15px; border: 1px solid var(--gold); flex: 1; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .total-line { display: flex; justify-content: space-between; font-weight: 900; color: var(--maroon); font-size: 18px; padding-top: 5px; margin-top: 2px; border-top: 2px solid #e0d5b5; }
        
        /* تفاصيل الضريبة */
        .tax-info { font-size: 11px; color: #666; display: flex; flex-direction: column; gap: 3px; margin-top: 5px; }
        .tax-line { display: flex; justify-content: space-between; }

        .btn-pay { width: 100%; background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 8px; }
        .method-btn { padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-weight: bold; font-size: 12px; }
        .method-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }

        #mixedModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .modal-body input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--gold); border-radius: 8px; font-size: 18px; text-align: center; }

        #receipt-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { display: block; position: absolute; left: 0; top: 0; width: 72mm; padding: 5px; direction: rtl; }
            .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; }
            .print-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <header class="no-print">
        <div class="nav-btns">
            <a href="index.html" class="nav-btn">🔙 خروج</a>
            <a href="inventory.html" class="nav-btn">📦 المخزن</a>
            <a href="sales.html" class="nav-btn">📊 السجل</a>
        </div>
        <h2>🌿 شاهي وليف</h2>
        <div style="width:40px"></div>
    </header>

    <div class="main-layout no-print">
        <div class="menu-side">
            <div class="category-bar" id="categoryBar">
                <button class="cat-btn active" onclick="changeCategory('tea', this)">شاي</button>
                <button class="cat-btn" onclick="changeCategory('karak', this)">كرك</button>
                <button class="cat-btn" onclick="changeCategory('bakery', this)">مخبوزات</button>
                <button class="cat-btn" onclick="changeCategory('extras', this)">إضافات</button>
                <button class="cat-btn" onclick="changeCategory('games', this)">ألعاب</button>
            </div>
            <div id="itemsGrid" class="items-grid"></div>
        </div>

        <div class="cart-side">
            <h3 style="margin-bottom:5px; color:var(--maroon); font-size: 15px;">🛒 الطلب الحالي</h3>
            <input type="tel" id="customerPhone" placeholder="رقم الجوال (اختياري)" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; margin-bottom:5px; font-size: 12px;">
            
            <!-- السلة (الارتفاع 45% من مساحة الجهة اليسرى) -->
            <div id="cartList" class="cart-items"></div>
            
            <div class="cart-footer">
                <div>
                    <div class="total-line">
                        <span>الإجمالي:</span>
                        <span><span id="grandTotal">0.00</span> ﷼</span>
                    </div>
                    
                    <!-- تفصيل الضريبة (الحسبة العكسية) -->
                    <div class="tax-info">
                        <div class="tax-line">
                            <span>قبل الضريبة:</span>
                            <span><span id="subTotal">0.00</span> ﷼</span>
                        </div>
                        <div class="tax-line">
                            <span>ضريبة (15%):</span>
                            <span><span id="taxAmount">0.00</span> ﷼</span>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-top:10px;">
                        <button class="method-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                        <button class="method-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                        <button class="method-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
                    </div>
                </div>
                <button class="btn-pay" onclick="handlePayment()">إتمام و طباعة 🧾</button>
            </div>
        </div>
    </div>

    <!-- نافذة الدفع المختلط -->
    <div id="mixedModal" class="no-print">
        <div class="modal-body">
            <h3 style="color:var(--maroon);">دفع مختلط</h3>
            <input type="number" id="cashInput" placeholder="المبلغ النقدي" oninput="calculateSplit()">
            <div style="display:flex; justify-content:space-around; margin:10px 0; font-size:13px;">
                <div>كاش: <b id="splitCash">0.00</b></div>
                <div>شبكة: <b id="splitCard">0.00</b></div>
            </div>
            <button class="btn-pay" onclick="confirmMixedPayment()">تأكيد العملية</button>
            <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:grey; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="receipt-print"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], cart = [], payMethod = 'نقدي', currentCat = 'tea';

        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            renderItems(); 
        });

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = allProducts.filter(p => p.cat === currentCat).map(p => `
                <div class="item-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                    <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                    <div style="color:var(--maroon); font-weight:900;">${p.price.toFixed(2)} ﷼</div>
                </div>`).join('');
        }

        function addToCart(id, name, price) {
            const item = cart.find(c => c.id === id);
            if (item) item.qty++; else cart.push({id, name, price, qty: 1});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `<div class="cart-row"><span onclick="removeItem(${idx})">✕</span><span>${item.name} (x${item.qty})</span><span>${(item.price * item.qty).toFixed(2)}</span></div>`;
            }).join('');
            
            // الحسبة العكسية للضريبة 15%
            const subtotal = total / 1.15;
            const tax = total - subtotal;

            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('subTotal').innerText = subtotal.toFixed(2);
            document.getElementById('taxAmount').innerText = tax.toFixed(2);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCart(); }

        function setPayMethod(m, btn) {
            payMethod = m;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function processOrder(method, details) {
            const total = document.getElementById('grandTotal').innerText;
            const tax = document.getElementById('taxAmount').innerText;
            const subtotal = document.getElementById('subTotal').innerText;

            const order = {
                items: cart.map(item => ({ name: item.name, q: item.qty, price: item.price, totalItem: (item.qty * item.price).toFixed(2) })),
                total: total, tax: tax, subtotal: subtotal,
                method: method, paymentDetails: details,
                phone: document.getElementById('customerPhone').value || "عميل محلي",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            const updates = {};
            cart.forEach(item => {
                const p = allProducts.find(prod => prod.id === item.id);
                if (p) updates[`/products/${item.id}/stock`] = (p.stock || 0) - item.qty;
            });

            try {
                await db.ref().update(updates);
                await db.ref('sales').push(order);
                order.timestamp = Date.now();
                printReceipt(order);
                cart = []; updateCart(); document.getElementById('customerPhone').value = "";
            } catch (e) { alert("خطأ: " + e.message); }
        }

        function handlePayment() {
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            if (total <= 0) return;
            if (payMethod === 'مختلط') {
                document.getElementById('cashInput').value = "";
                document.getElementById('mixedModal').style.display = 'flex';
            } else {
                processOrder(payMethod, {cash: payMethod === 'نقدي' ? total : 0, card: payMethod === 'شبكة' ? total : 0});
            }
        }

        function calculateSplit() {
            const total = parseFloat(document.getElementById('grandTotal').innerText);
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const card = Math.max(0, total - cash);
            document.getElementById('splitCash').innerText = cash.toFixed(2);
            document.getElementById('splitCard').innerText = card.toFixed(2);
        }

        function confirmMixedPayment() {
            const cash = parseFloat(document.getElementById('splitCash').innerText);
            const card = parseFloat(document.getElementById('splitCard').innerText);
            processOrder('مختلط', {cash, card});
            closeModal();
        }

        function closeModal() { document.getElementById('mixedModal').style.display = 'none'; }

        function printReceipt(order) {
            const printDiv = document.getElementById('receipt-print');
            const itemsHtml = order.items.map(i => `<tr><td>${i.name} x${i.q}</td><td align="left">${parseFloat(i.totalItem).toFixed(2)}</td></tr>`).join('');
            printDiv.innerHTML = `
                <div class="receipt-header"><h3>🌿 شاهي وليف</h3><p>فاتورة ضريبية مبسطة</p></div>
                <p style="font-size:10px;">التاريخ: ${new Date(order.timestamp).toLocaleString('ar-SA')}</p>
                <table class="print-table"><tbody>${itemsHtml}</tbody></table>
                <div style="border-top:1px dashed #000; padding-top:5px; font-size:12px;">
                    <div style="display:flex; justify-content:space-between;"><span>المجموع غير شامل الضريبة:</span><span>${order.subtotal}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>ضريبة القيمة المضافة 15%:</span><span>${order.tax}</span></div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; margin-top:5px;"><span>الإجمالي النهائي:</span><span>${order.total} ﷼</span></div>
                </div>
                <div style="text-align:center; margin-top:15px; font-size:10px;">شكراً لزيارتكم</div>
            `;
            setTimeout(() => { window.print(); }, 500);
        }
    </script>
</body>
</html>
