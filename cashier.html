<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { height: 50px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .header-btns { display: flex; gap: 5px; }
        .nav-btn { background: var(--gold); border: none; padding: 6px 10px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 11px; }
        .print-test-btn { background: #444; border: none; padding: 6px 10px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 11px; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .menu-side { flex: 2.2; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .category-bar { display: flex; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 8px; overflow-x: auto; }
        .cat-btn { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; background: white; white-space: nowrap; }
        .cat-btn.active { background: var(--maroon); color: white; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        .item-card { background: white; border-radius: 10px; padding: 12px; border: 1px solid #eee; cursor: pointer; text-align: center; }

        .cart-side { flex: 1.8; background: white; border-radius: 15px; display: flex; flex-direction: column; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-items-container { overflow-y: auto; margin: 8px 0; border-top: 1px solid #f5f5f5; padding-top: 8px; flex: 1; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: bold; }
        .remove-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 0 8px; border: none; background: none; font-size: 16px; }
        
        .summary-box { background: #fffcf0; padding: 10px; border-radius: 10px; border: 1px dashed var(--gold); }
        .total-line { display: flex; justify-content: space-between; font-weight: bold; color: var(--maroon); font-size: 18px; }

        /* منطقة الدفع المختلط */
        #mixedZone { display: none; margin: 10px 0; background: #e3f2fd; padding: 10px; border-radius: 8px; border: 1px solid #bbdefb; }
        .mixed-input { width: 100%; padding: 8px; border: 1px solid #90caf9; border-radius: 5px; margin-bottom: 5px; font-weight: bold; }

        .payment-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 8px 0; }
        .pay-btn { padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        .pay-btn.active { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .hold-btn { background: #ff9800; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .view-hold-btn { background: #2196f3; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .btn-pay { grid-column: span 2; background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #holdModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        .held-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<header>
    <div class="header-btns">
        <button class="nav-btn" onclick="location.href='index.html'">↩ الرئيسية</button>
        <button class="print-test-btn" onclick="window.print()">🔍 فحص الطابعة</button>
    </div>
    <span style="font-weight: bold;">🌿 شاهي وليف | الكاشير</span>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('games', this)">ألعاب</button>
        </div>
        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div class="cart-side">
        <input type="tel" id="custPhone" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; margin-bottom:8px;" placeholder="رقم جوال العميل">
        
        <div class="cart-items-container" id="cartList">
            <p style="text-align:center; color:#ccc;">السلة فارغة</p>
        </div>

        <!-- حقول الدفع المختلط -->
        <div id="mixedZone" class="no-print">
            <label style="font-size: 11px; font-weight: bold;">المبلغ النقدي (كاش):</label>
            <input type="number" id="cashInput" class="mixed-input" placeholder="0.00" oninput="calculateMixed()">
            <div style="font-size: 12px; display: flex; justify-content: space-between;">
                <span>المتبقي للشبكة:</span>
                <b id="cardAmount">0.00</b>
            </div>
        </div>

        <div class="summary-box">
            <div class="total-line"><span>الإجمالي:</span><span><span id="grandTotal">0.00</span> ﷼</span></div>
        </div>

        <div class="payment-box no-print">
            <button class="pay-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
            <button class="pay-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
            <button class="pay-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
        </div>

        <div class="action-grid no-print">
            <button class="hold-btn" onclick="holdInvoice()">⏳ تعليق</button>
            <button class="view-hold-btn" onclick="showHeldModal()">📂 المعلقة</button>
            <button class="btn-pay" onclick="completeSale()">إتمام الفاتورة ✅</button>
        </div>
    </div>
</div>

<div id="holdModal" class="no-print">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; color:var(--maroon);">الفواتير المعلقة</h3>
        <div id="heldInvoicesList"></div>
        <button onclick="document.getElementById('holdModal').style.display='none'" style="width:100%; margin-top:10px; padding:10px; border-radius:8px; border:none; background:#eee; cursor:pointer;">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [], selectedMethod = "نقدي", currentCat = 'tea';

    function syncProducts() {
        db.ref('products').on('value', (s) => {
            const data = s.val();
            window.allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            filterCat(currentCat, document.querySelector('.cat-btn.active'));
        });
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = (window.allProducts || []).filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = filtered.map(p => `<div class="item-card" onclick="addToCart('${p.name}', ${p.price})"><span>${p.name}</span><br><b>${p.price.toFixed(2)}</b></div>`).join('');
    }

    function addToCart(name, price) {
        const item = cart.find(i => i.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        renderCart();
        if(selectedMethod === 'مختلط') calculateMixed();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
        if(selectedMethod === 'مختلط') calculateMixed();
    }

    function renderCart() {
        let total = 0;
        const list = document.getElementById('cartList');
        if (cart.length === 0) list.innerHTML = '<p style="text-align:center; color:#ccc;">السلة فارغة</p>';
        else {
            list.innerHTML = cart.map((item, index) => {
                total += (item.price * item.qty);
                return `<div class="cart-row"><button class="remove-btn" onclick="removeFromCart(${index})">✕</button><span style="flex:1">${item.name} (x${item.qty})</span><span>${(item.price * item.qty).toFixed(2)}</span></div>`;
            }).join('');
        }
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function setPayMethod(m, btn) {
        selectedMethod = m;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mixedZone').style.display = (m === 'مختلط') ? 'block' : 'none';
        if(m === 'مختلط') calculateMixed();
    }

    function calculateMixed() {
        const total = parseFloat(document.getElementById('grandTotal').innerText) || 0;
        const cash = parseFloat(document.getElementById('cashInput').value) || 0;
        const card = Math.max(0, total - cash);
        document.getElementById('cardAmount').innerText = card.toFixed(2);
    }

    function holdInvoice() {
        if(cart.length === 0) return;
        const name = prompt("اسم الفاتورة المعلقة:");
        if(!name) return;
        db.ref('held_invoices').push({ name, items: cart, phone: document.getElementById('custPhone').value, time: new Date().toLocaleTimeString() })
        .then(() => { cart=[]; renderCart(); document.getElementById('custPhone').value=""; });
    }

    function showHeldModal() {
        document.getElementById('holdModal').style.display = 'flex';
        db.ref('held_invoices').on('value', (s) => {
            const data = s.val();
            const listDiv = document.getElementById('heldInvoicesList');
            if(!data) { listDiv.innerHTML = "لا يوجد فواتير معلقة"; return; }
            listDiv.innerHTML = Object.keys(data).map(k => `
                <div class="held-item">
                    <div style="flex:1"><b>${data[k].name}</b></div>
                    <button onclick="resume('${k}')" style="background:#e8f5e9; color:#2e7d32; border:1px solid #2e7d32; padding:4px 8px; border-radius:5px; cursor:pointer; margin-left:5px;">استعادة</button>
                    <button onclick="deleteHeld('${k}')" style="color:red; border:none; background:none; cursor:pointer;">حذف</button>
                </div>`).join('');
        });
    }

    function resume(k) {
        db.ref('held_invoices/' + k).once('value', (s) => {
            const d = s.val(); cart = d.items; document.getElementById('custPhone').value = d.phone || "";
            renderCart(); db.ref('held_invoices/' + k).remove();
            document.getElementById('holdModal').style.display = 'none';
        });
    }

    function deleteHeld(k) { if(confirm("حذف هذه الفاتورة؟")) db.ref('held_invoices/' + k).remove(); }

    function completeSale() {
        if(cart.length === 0) return alert("السلة فارغة");
        const total = document.getElementById('grandTotal').innerText;
        const paymentInfo = (selectedMethod === 'مختلط') ? `مختلط (كاش: ${document.getElementById('cashInput').value} | شبكة: ${document.getElementById('cardAmount').innerText})` : selectedMethod;
        
        db.ref('sales').push({ 
            total: total, phone: document.getElementById('custPhone').value, payment: paymentInfo, 
            items: cart, timestamp: firebase.database.ServerValue.TIMESTAMP 
        }).then(() => { 
            window.print(); cart = []; document.getElementById('custPhone').value=""; 
            document.getElementById('cashInput').value=""; renderCart(); 
        });
    }

    window.onload = syncProducts;
</script>
</body>
</html>
