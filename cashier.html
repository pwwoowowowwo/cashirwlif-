<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف الذكي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; --green: #2e7d32; --blue: #1976d2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 50px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .header-btns { display: flex; gap: 8px; }
        .add-btn { border: none; padding: 6px 15px; border-radius: 6px; color: white; cursor: pointer; font-size: 13px; font-weight: bold; }
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .menu-side { flex: 3; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .category-bar { display: flex; gap: 6px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 8px; }
        .cat-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; background: white; }
        .cat-btn.active { background: var(--maroon); color: white; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .item-card { background: white; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; border: 1px solid #eee; cursor: pointer; text-align: center; }
        .cart-side { flex: 1.5; min-width: 330px; background: white; border-radius: 15px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .cart-items-container { flex: 1; overflow-y: auto; margin: 10px 0; border: 1px solid #f9f9f9; }
        .cart-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f1f1; font-size: 14px; align-items: center; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .num-btn { padding: 12px; background: #fdfdfd; border: 1px solid #eee; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--maroon); }
        .num-btn.active { background: var(--maroon); color: white; }
        .payment-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 12px; }
        .pay-btn { padding: 10px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        .pay-btn.active { border-color: var(--green); color: var(--green); background: #e8f5e9; }
        .btn-pay { background: var(--green); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; width: 100%; }
        .total-display { font-size: 26px; font-weight: bold; color: var(--maroon); text-align: center; padding: 10px; background: #fffcf0; border-radius: 10px; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | الكاشير</span>
    <div class="header-btns">
        <button id="printerStatus" class="add-btn" style="background:#e67e22" onclick="managePrinter()">🔍 فحص الطابعة</button>
        <button class="add-btn" style="background:var(--gold)" onclick="location.href='index.html'">🏠 الرئيسية</button>
    </div>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('sides', this)">طلبات جانبية</button>
        </div>
        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div class="cart-side">
        <input type="tel" id="custPhone" placeholder="رقم جوال العميل 📱" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:8px; text-align:center; margin-bottom:10px;">
        <div class="cart-items-container" id="cartList"></div>
        <div class="numpad">
            <button class="num-btn active" onclick="setQty(1, this)">1</button>
            <button class="num-btn" onclick="setQty(2, this)">2</button>
            <button class="num-btn" onclick="setQty(3, this)">3</button>
        </div>
        <div class="payment-box">
            <button class="pay-btn active" id="payCash" onclick="setPay('نقدي', this)">💵 نقدي</button>
            <button class="pay-btn" id="payCard" onclick="setPay('شبكة', this)">💳 شبكة</button>
            <button class="pay-btn" id="payMixed" onclick="setPay('مختلط', this)">💰 مختلط</button>
        </div>
        <div class="total-display"><span id="grandTotal">0.00</span> ﷼</div>
        <button class="btn-pay" onclick="finishSaleCloud()">إنهاء الطلب ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [], currentQty = 1, payMethod = "نقدي", currentCat = 'tea', printerWindow = null;

    function syncProducts() {
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            window.allProducts = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            filterCat(currentCat, document.querySelector('.cat-btn.active'));
        });
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const grid = document.getElementById('itemsGrid');
        const filtered = (window.allProducts || []).filter(p => p.cat === cat);
        grid.innerHTML = filtered.map(p => `<div class="item-card" onclick="addToCart('${p.name}', ${p.price})"><span>${p.name}</span><b>${p.price} ﷼</b></div>`).join('');
    }

    // دالة الإضافة مع منع التكرار
    function addToCart(name, price) {
        const existingItem = cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.qty += currentQty;
        } else {
            cart.push({ name: name, price: price, qty: currentQty });
        }
        renderCart();
        setQty(1, document.querySelector('.num-btn:first-child'));
    }

    // عرض السلة مع الكميات الإجمالية
    function renderCart() {
        document.getElementById('cartList').innerHTML = cart.map((item, i) => `
            <div class="cart-row">
                <div style="flex:2"><b>${item.name}</b><br><small>${item.price.toFixed(2)} ﷼</small></div>
                <div style="flex:1; text-align:center; color:var(--maroon)"><b>x${item.qty}</b></div>
                <div style="flex:1; text-align:left"><b>${(item.price * item.qty).toFixed(2)}</b> <span onclick="cart.splice(${i},1);renderCart()" style="color:red; cursor:pointer">✕</span></div>
            </div>`).join('');
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function setQty(n, btn) { currentQty = n; document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function setPay(m, btn) { payMethod = m; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    function managePrinter() {
        if (printerWindow === null || printerWindow.closed) {
            printerWindow = window.open('print.html', 'PrinterWindow', 'width=450,height=700');
            document.getElementById('printerStatus').innerHTML = "🟢 الطابعة تعمل";
            document.getElementById('printerStatus').style.background = "#2e7d32";
        } else { printerWindow.focus(); }
    }

    function finishSaleCloud() {
        if(cart.length === 0) return;
        const total = parseFloat(document.getElementById('grandTotal').innerText);
        let cashAmt = total, cardAmt = 0, finalMethod = payMethod;

        if (payMethod === 'مختلط') {
            const input = prompt(`الإجمالي ${total} ﷼. أدخل مبلغ الكاش:`, "0");
            if (input === null) return;
            cashAmt = parseFloat(input);
            cardAmt = total - cashAmt;
            finalMethod = `مختلط (كاش: ${cashAmt.toFixed(2)} | شبكة: ${cardAmt.toFixed(2)})`;
        } else if (payMethod === 'شبكة') { cashAmt = 0; cardAmt = total; }

        const orderData = { 
            amount: total, method: finalMethod, paymentDetails: { cash: cashAmt, card: cardAmt },
            customer: document.getElementById('custPhone').value || "عميل عام", items: cart,
            date: new Date().toLocaleDateString('ar-SA'), timestamp: firebase.database.ServerValue.TIMESTAMP 
        };

        db.ref('sales').push(orderData).then(() => {
            alert("تم إرسال الطلب بنجاح ✅");
            cart = []; renderCart(); document.getElementById('custPhone').value = '';
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(err => console.log(err)); });
    }
    window.onload = syncProducts;
</script>
</body>
</html>
