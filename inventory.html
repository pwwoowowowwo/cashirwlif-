<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن شاهي وليف السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* شريط حالة الاتصال */
        #netStatus { text-align: center; padding: 5px; font-size: 12px; border-radius: 5px; margin-bottom: 10px; display: none; }
        .online-msg { background: #e8f5e9; color: #2e7d32; }
        .offline-msg { background: #ffebee; color: #c62828; display: block !important; }

        h2 { color: var(--maroon); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; align-items: end; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .btn-add { padding: 10px 20px; background: var(--maroon); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-print { background: var(--gold); margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: right; color: var(--maroon); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .low-stock { background: #ffebee; color: #c62828; animation: blink 1s infinite; padding: 4px; border-radius: 4px; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* تنسيق الطباعة A4 */
        @media print {
            .form-row, .btn-back, .delete-btn, #netStatus, .btn-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
            table { border: 1px solid #000; }
            th, td { border: 1px solid #000; padding: 8px; font-size: 12pt; }
            h2::after { content: " - تقرير المخزن الرسمي"; }
        }
    </style>
</head>
<body>

<div id="netStatus" class="offline-msg">⚠️ أنت تعمل الآن "أوفلاين" - سيتم مزامنة البيانات عند توفر النت</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" style="text-decoration:none; color:var(--gold);">⬅ رجوع للرئيسية</a>
        <button class="btn-add btn-print" onclick="window.print()">🖨 طباعة A4</button>
    </div>
    
    <h2>📦 إدارة المخزن - شاهي وليف</h2>

    <div class="form-row">
        <div style="display:flex; flex-direction:column;">
            <label>اسم الصنف</label>
            <input type="text" id="itemName" placeholder="كرك وليف">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>السعر (﷼)</label>
            <input type="number" id="itemPrice" placeholder="0.00">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>الكمية</label>
            <input type="number" id="itemQty" placeholder="0">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>القسم</label>
            <select id="itemCat">
                <option value="tea">شاي</option>
                <option value="karak">كرك</option>
                <option value="bakery">مخبوزات</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItemToCloud()">إضافة</button>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>الصنف</th>
                <th>القسم</th>
                <th>السعر</th>
                <th>المتوفر</th>
                <th class="delete-btn">إجراء</th>
            </tr>
        </thead>
        <tbody id="inventoryTableBody">
            <tr><td colspan="5" style="text-align:center;">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // متابعة حالة الإنترنت
    db.ref('.info/connected').on('value', (snap) => {
        const statusDiv = document.getElementById('netStatus');
        if (snap.val() === true) {
            statusDiv.style.display = 'none';
        } else {
            statusDiv.style.display = 'block';
        }
    });

    function addItemToCloud() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const cat = document.getElementById('itemCat').value;

        if (!name || isNaN(price)) return alert("أكمل البيانات");

        db.ref('products').push({
            name: name, price: price, qty: qty, cat: cat
        }).then(() => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = '';
        });
    }

    db.ref('products').on('value', (snapshot) => {
        const tableBody = document.getElementById('inventoryTableBody');
        tableBody.innerHTML = '';
        const data = snapshot.val();
        if (!data) { tableBody.innerHTML = '<tr><td colspan="5">المخزن فارغ</td></tr>'; return; }

        Object.keys(data).forEach(key => {
            const item = data[key];
            const isLow = item.qty <= 5;
            tableBody.innerHTML += `
                <tr>
                    <td><b>${item.name}</b></td>
                    <td>${item.cat === 'tea' ? 'شاي' : item.cat === 'karak' ? 'كرك' : 'مخبوزات'}</td>
                    <td>${item.price.toFixed(2)} ﷼</td>
                    <td><span class="${isLow ? 'low-stock' : ''}">${item.qty} وحدة</span></td>
                    <td class="delete-btn"><span style="color:red; cursor:pointer;" onclick="deleteItem('${key}')">✖</span></td>
                </tr>
            `;
        });
    });

    function deleteItem(key) {
        if(confirm('حذف الصنف؟')) db.ref('products/' + key).remove();
    }
</script>
</body>
</html>
