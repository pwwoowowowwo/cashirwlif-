<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن شاهي وليف السحابي</title>
    <!-- مكتبات فايبربيز للربط السحابي -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--maroon); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; color: #444; font-size: 13px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .btn-add { padding: 10px 20px; background: var(--maroon); color: white; border: none; border-radius: 8px; cursor: pointer; height: 41px; font-weight: bold; }
        .btn-add:hover { background: #4a0000; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: right; color: var(--maroon); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn-back { display: inline-block; padding: 8px 18px; background: var(--gold); color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .delete-btn { color: #d32f2f; cursor: pointer; font-weight: bold; }
        .stock-badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .low-stock { background: #ffebee; color: #c62828; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">⬅ رجوع للكاشير</a>
    <h2>📦 إدارة المخزن السحابي - شاهي وليف</h2>

    <div class="form-row">
        <div class="form-group">
            <label>اسم الصنف</label>
            <input type="text" id="itemName" placeholder="مثلاً: كرك وليف">
        </div>
        <div class="form-group">
            <label>السعر</label>
            <input type="number" id="itemPrice" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>الكمية</label>
            <input type="number" id="itemQty" placeholder="0">
        </div>
        <div class="form-group">
            <label>القسم</label>
            <select id="itemCat">
                <option value="tea">شاي</option>
                <option value="karak">كرك</option>
                <option value="bakery">مخبوزات</option>
                <option value="sides">أخرى</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItemToCloud()">إضافة للمخزن</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الصنف</th>
                <th>القسم</th>
                <th>السعر</th>
                <th>المتوفر</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody id="inventoryTableBody">
            <tr><td colspan="5" style="text-align:center;">جاري تحميل بيانات المخزن...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // إضافة صنف للسحاب
    function addItemToCloud() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const cat = document.getElementById('itemCat').value;

        if (!name || isNaN(price) || isNaN(qty)) {
            alert("يرجى التأكد من ملء البيانات بشكل صحيح");
            return;
        }

        db.ref('products').push({
            name: name,
            price: price,
            qty: qty,
            cat: cat,
            lastUpdated: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            // مسح الحقول بعد النجاح
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = '';
            alert("تمت الإضافة للمخزن السحابي ✅");
        });
    }

    // جلب البيانات ومراقبة التحديثات فورياً
    db.ref('products').on('value', (snapshot) => {
        const tableBody = document.getElementById('inventoryTableBody');
        tableBody.innerHTML = '';
        const data = snapshot.val();

        if (!data) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">المخزن فارغ حالياً</td></tr>';
            return;
        }

        Object.keys(data).forEach(key => {
            const item = data[key];
            const isLow = item.qty <= 10; // تنبيه عند وصول الكمية لـ 10 أو أقل
            const catNames = { tea: 'شاي', karak: 'كرك', bakery: 'مخبوزات', sides: 'أخرى' };

            tableBody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td><small>${catNames[item.cat] || 'عام'}</small></td>
                    <td>${item.price.toFixed(2)} ﷼</td>
                    <td><span class="stock-badge ${isLow ? 'low-stock' : ''}">${item.qty} وحدة</span></td>
                    <td>
                        <span class="delete-btn" onclick="deleteFromCloud('${key}')">حذف ✖</span>
                    </td>
                </tr>
            `;
        });
    });

    // حذف صنف من السحاب
    function deleteFromCloud(key) {
        if(confirm('هل تريد حذف هذا الصنف من مخزن السحاب؟')) {
            db.ref('products/' + key).remove();
        }
    }
</script>

</body>
</html>
