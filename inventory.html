<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة مخزن شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr auto; gap: 10px; margin-bottom: 25px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: var(--maroon); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f8f8; padding: 15px; text-align: right; color: var(--maroon); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="Cashier.html" style="text-decoration:none; color:var(--maroon); font-weight:bold;">⬅ الكاشير</a>
            <h2 style="color:var(--maroon);">📦 إدارة المخزن</h2>
            <button onclick="window.print()" style="background:var(--gold); border:none; color:white; padding:8px 15px; border-radius:6px; cursor:pointer;">تقرير الجرد</button>
        </header>
        <div class="form-grid">
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
            <input type="number" id="pStock" placeholder="الكمية">
            <select id="pCat">
                <option value="tea">شاي</option>
                <option value="karak">كرك</option>
                <option value="bakery">مخبوزات</option>
                <option value="extras">إضافات</option>
                <option value="games">الطلبات الجانبية</option>
            </select>
            <button class="btn-save" onclick="saveItem()">إضافة ✅</button>
        </div>
        <table>
            <thead><tr><th>الصنف</th><th>القسم</th><th>السعر</th><th>الكمية</th><th>حذف</th></tr></thead>
            <tbody id="inventoryTable"></tbody>
        </table>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function saveItem() {
            const name = document.getElementById('pName').value, price = parseFloat(document.getElementById('pPrice').value), stock = parseInt(document.getElementById('pStock').value), cat = document.getElementById('pCat').value;
            if(name && !isNaN(price)) { db.ref('products').push({ name, price, stock, cat }); }
        }
        db.ref('products').on('value', snap => {
            const data = snap.val(), table = document.getElementById('inventoryTable'); table.innerHTML = '';
            if(data) Object.keys(data).forEach(id => {
                const p = data[id];
                table.innerHTML += `<tr><td><b>${p.name}</b></td><td>${p.cat}</td><td>${p.price.toFixed(2)}</td><td>${p.stock || 0}</td><td><button onclick="db.ref('products/${id}').remove()" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button></td></tr>`;
            });
        });
    </script>
</body>
</html>
