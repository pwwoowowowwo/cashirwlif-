<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن شاهي وليف السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #netStatus { text-align: center; padding: 5px; font-size: 12px; border-radius: 5px; margin-bottom: 10px; display: none; }
        .offline-msg { background: #ffebee; color: #c62828; display: block !important; }

        h2 { color: var(--maroon); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr auto; gap: 10px; margin-bottom: 20px; align-items: end; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
        input:focus, select:focus { border-color: var(--maroon); }
        
        .btn-add { padding: 12px 20px; background: var(--maroon); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-print { background: var(--gold); margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: right; color: var(--maroon); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .low-stock { background: #ffebee; color: #c62828; font-weight: bold; padding: 4px 8px; border-radius: 4px; border: 1px solid #c62828; animation: blink 1.5s infinite; }
        .extra-tag { background: #e3f2fd; color: #1565c0; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 5px; }

        @keyframes blink { 50% { opacity: 0.6; } }

        @media print {
            .form-row, .delete-btn, #netStatus, .btn-print, a { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; width: 100%; }
            table { border: 1px solid #000; width: 100%; }
            th, td { border: 1px solid #000; padding: 8px; font-size: 12pt; text-align: center; }
        }
    </style>
</head>
<body>

<div id="netStatus" class="offline-msg">⚠️ جاري المزامنة مع السحاب...</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" style="text-decoration:none; color:var(--gold); font-weight: bold;">⬅ رجوع للكاشير</a>
        <button class="btn-add btn-print" onclick="window.print()">🖨 طباعة تقرير الجرد</button>
    </div>
    
    <h2>📦 إدارة المخزن والإضافات - شاهي وليف</h2>

    <div class="form-row">
        <div style="display:flex; flex-direction:column;">
            <label>اسم الصنف أو الإضافة</label>
            <input type="text" id="itemName" placeholder="مثلاً: حليب مبخر">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>السعر (﷼)</label>
            <input type="number" id="itemPrice" placeholder="0.00" step="0.5">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>الكمية المتوفرة</label>
            <input type="number" id="itemQty" placeholder="0">
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>القسم</label>
            <select id="itemCat">
                <option value="tea">شاي</option>
                <option value="karak">كرك</option>
                <option value="bakery">مخبوزات</option>
                <option value="extras">إضافات ✨</option>
                <option value="games">ألعاب 🎲</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItemToCloud()">حفظ البيانات</button>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>النوع</th>
                <th>الصنف</th>
                <th>القسم</th>
                <th>السعر</th>
                <th>المتوفر حالياً</th>
                <th class="delete-btn">إجراء</th>
            </tr>
        </thead>
        <tbody id="inventoryTableBody">
            <tr><td colspan="6" style="text-align:center;">جاري جرد المخزن...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('.info/connected').on('value', (snap) => {
        const statusDiv = document.getElementById('netStatus');
        statusDiv.style.display = (snap.val() === true) ? 'none' : 'block';
    });

    function addItemToCloud() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const cat = document.getElementById('itemCat').value;

        if (!name || isNaN(price) || isNaN(qty)) return alert("يرجى إكمال جميع الحقول");

        db.ref('products').push({
            name: name, 
            price: price, 
            qty: qty, 
            cat: cat,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = '';
            console.log("تمت الإضافة بنجاح");
        });
    }

    db.ref('products').on('value', (snapshot) => {
        const tableBody = document.getElementById('inventoryTableBody');
        tableBody.innerHTML = '';
        const data = snapshot.val();
        
        if (!data) { 
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا يوجد أصناف في المخزن</td></tr>'; 
            return; 
        }

        Object.keys(data).forEach(key => {
            const item = data[key];
            const isLow = item.qty <= 5;
            const isExtra = item.cat === 'extras';

            let catDisplayName = "أخرى";
            const catMap = { 
                'tea': 'شاي', 
                'karak': 'كرك', 
                'bakery': 'مخبوزات', 
                'extras': 'إضافات', 
                'games': 'ألعاب' 
            };
            catDisplayName = catMap[item.cat] || item.cat;

            tableBody.innerHTML += `
                <tr>
                    <td>${isExtra ? '<span class="extra-tag">إضافة</span>' : '📦 صنف'}</td>
                    <td><b>${item.name}</b></td>
                    <td>${catDisplayName}</td>
                    <td>${item.price.toFixed(2)} ﷼</td>
                    <td><span class="${isLow ? 'low-stock' : ''}">${item.qty} وحدة</span></td>
                    <td class="delete-btn">
                        <button onclick="deleteItem('${key}')" style="background:none; border:none; color:red; cursor:pointer; font-size:18px;">✖</button>
                    </td>
                </tr>
            `;
        });
    });

    function deleteItem(key) {
        if(confirm('حذف هذا الصنف نهائياً؟')) {
            db.ref('products/' + key).remove();
        }
    }
</script>
</body>
</html>
