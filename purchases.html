<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشتريات شاهي وليف السحابية</title>
    <!-- مكتبات فايبربيز للربط السحابي -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--maroon); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; color: #444; font-size: 14px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        
        .btn-save { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save:hover { background: #1b5e20; transform: translateY(-2px); }

        .stats-row { display: grid; grid-template-columns: 1fr; margin-bottom: 20px; text-align: center; }
        .stat-box { background: #e8f5e9; padding: 15px; border-radius: 10px; border: 1px solid #c8e6c9; }
        .stat-box h3 { margin: 0; color: #2e7d32; font-size: 24px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f8f8; padding: 12px; text-align: right; color: var(--maroon); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .btn-back { display: inline-block; padding: 8px 18px; background: var(--gold); color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .delete-btn { color: #d32f2f; cursor: pointer; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">⬅ رجوع للرئيسية</a>
    <h2>تسجيل المشتريات وتوريد البضاعة</h2>

    <div class="stats-row">
        <div class="stat-box">
            <small>إجمالي المصروفات (المشتريات)</small>
            <h3 id="totalPurchases">0.00 ﷼</h3>
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>اسم المورد / الشركة</label>
            <input type="text" id="purSupplier" placeholder="مثلاً: مطاحن الغربية">
        </div>
        <div class="form-group">
            <label>المبلغ الإجمالي (﷼)</label>
            <input type="number" id="purAmount" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>وصف البضاعة</label>
            <input type="text" id="purDesc" placeholder="أكياس شاي، سكر، إلخ">
        </div>
        <div class="form-group">
            <label>رقم الفاتورة</label>
            <input type="text" id="purInvoice" placeholder="اختياري">
        </div>
    </div>

    <button class="btn-save" onclick="addPurchaseToCloud()">حفظ وتوريد سحابي ✅</button>

    <table>
        <thead>
            <tr>
                <th>المورد والبضاعة</th>
                <th>المبلغ</th>
                <th>التاريخ</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody id="purTableBody">
            <tr><td colspan="4" style="text-align:center;">جاري جلب سجل المشتريات...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // إعدادات Firebase الخاصة بـ شاهي وليف
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // إضافة مشتريات للسحاب
    function addPurchaseToCloud() {
        const supplier = document.getElementById('purSupplier').value;
        const amount = parseFloat(document.getElementById('purAmount').value);
        const desc = document.getElementById('purDesc').value;
        const invoice = document.getElementById('purInvoice').value;
        const date = new Date().toLocaleDateString('ar-SA');

        if (!amount || amount <= 0) {
            alert("يرجى إدخال مبلغ صحيح");
            return;
        }

        db.ref('purchases').push({
            supplier, 
            amount, 
            desc, 
            invoice: invoice || "بدون", 
            date,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            // تصفير الحقول
            document.getElementById('purSupplier').value = '';
            document.getElementById('purAmount').value = '';
            document.getElementById('purDesc').value = '';
            document.getElementById('purInvoice').value = '';
            alert("تم حفظ المشتريات بنجاح ✅");
        });
    }

    // جلب ومراقبة البيانات فورياً
    db.ref('purchases').on('value', (snapshot) => {
        const tableBody = document.getElementById('purTableBody');
        const data = snapshot.val();
        let total = 0;
        tableBody.innerHTML = '';

        if (!data) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا توجد سجلات مشتريات حالياً</td></tr>';
            document.getElementById('totalPurchases').innerText = "0.00 ﷼";
            return;
        }

        // تحويل الكائن لمصفوفة وترتيبها من الأحدث للأقدم
        const items = Object.keys(data).map(key => ({ id: key, ...data[key] }));
        items.sort((a, b) => b.timestamp - a.timestamp);

        items.forEach(pur => {
            total += pur.amount;
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${pur.supplier}</strong><br><small style="color:#666">${pur.desc} (${pur.invoice})</small></td>
                    <td style="color:#b71c1c; font-weight:bold;">${pur.amount.toFixed(2)} ﷼</td>
                    <td>${pur.date}</td>
                    <td class="delete-btn" onclick="deletePurchase('${pur.id}')">✖</td>
                </tr>
            `;
        });

        document.getElementById('totalPurchases').innerText = total.toFixed(2) + " ﷼";
    });

    // حذف سجل مشتريات
    function deletePurchase(id) {
        if(confirm('هل أنت متأكد من حذف هذا السجل؟')) {
            db.ref('purchases/' + id).remove();
        }
    }
</script>

</body>
</html>
