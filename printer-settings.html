<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرك طباعة شاهي وليف - الربط المباشر بالـ IP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        #editorPanel { 
            background: #fff; 
            padding: 20px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; 
            width: 340px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        #editorPanel h4 { margin-top: 0; margin-bottom: 15px; font-weight: 900; font-size: 16px; }
        #editorPanel label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        #editorPanel input, #editorPanel textarea { 
            width: 100%; margin-bottom: 15px; padding: 10px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        #editorPanel input:focus, #editorPanel textarea:focus { border-color: #630000; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; font-size: 14px; transition: 0.2s; }
        
        #printArea { 
            background: white; 
            width: 72mm; 
            padding: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 12px; margin-bottom: 10px; }
        .receipt-title { font-size: 20px; font-weight: bold; margin: 0 0 5px 0; color: #000; }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; color: #000; font-weight: 500; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th { border-bottom: 1px solid #000; text-align: right; font-size: 12px; padding-bottom: 6px; font-weight: bold; color: #000; }
        td { padding: 6px 0; font-size: 12px; vertical-align: top; color: #000; font-weight: 500; word-break: break-word; }
        
        .total-section { border-top: 1px dashed #000; padding-top: 10px; margin-top: 10px; }
        .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: #000; }
        .footer { text-align: center; margin-top: 15px; font-size: 11px; border-top: 1px dashed #000; padding-top: 10px; color: #000; }

        @media print {
            @page { size: 72mm auto; margin: 0; }
            body { background: white; padding: 0; margin: 0; width: 72mm; display: block; }
            .no-print { display: none !important; }
            #printArea { box-shadow: none; width: 72mm; padding: 5mm 4mm; border-radius: 0; margin: 0; }
        }
    </style>
</head>
<body>

<div id="editorPanel" class="no-print">
    <h4 style="color: #630000;">⚙️ إعدادات الفاتورة والاتصال المباشر</h4>
    
    <div style="background: #fff3f3; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffcccc;">
        <label style="color: #630000;">🌐 عنوان IP الطابعة الحرارية:</label>
        <input type="text" id="printerIP" placeholder="مثال: 192.168.1.200" style="margin-bottom: 8px;">
        
        <label style="color: #630000;">🔌 منفذ الطابعة (Port):</label>
        <input type="text" id="printerPort" placeholder="المنفذ القياسي الموحد 9100" value="9100">
    </div>

    <label>اسم المنشأة / المحل:</label>
    <input type="text" id="editTitle" oninput="updateLive()">
    
    <label>بيانات الترويسة والعنوان والرقم الضريبي:</label>
    <textarea id="editHeader" oninput="updateLive()" rows="4" placeholder="اكتب هنا الرقم الضريبي، اسم الفرع، والعنوان..."></textarea>
    
    <label>نص أسفل الفاتورة:</label>
    <textarea id="editFooter" oninput="updateLive()" rows="2" placeholder="شكراً لزيارتكم..."></textarea>
    
    <button onclick="saveSettings()" class="btn" style="background: #630000; color: white;">حفظ الإعدادات والـ IP 💾</button>
    <button onclick="sendToPrinterSocket()" class="btn" style="background: #006644; color: white;">اختبار طباعة فورية للآيباد 📡</button>
    <button onclick="window.print()" class="btn" style="background: #444; color: white;">طباعة AirPrint للمتصفح 🖨</button>
</div>

<div id="printArea">
    <div class="receipt-header">
        <div class="receipt-title" id="dispTitle"></div>
        <div id="dispHeader" style="white-space: pre-line; font-size: 11px; font-weight: bold; line-height: 1.5;"></div>
    </div>

    <div id="orderInfo" style="margin-top: 5px;"></div>

    <table>
        <thead>
            <tr>
                <th>الصنف</th>
                <th style="text-align: center; width: 40px;">العدد</th>
                <th style="text-align: left; width: 70px;">المجموع</th>
            </tr>
        </thead>
        <tbody id="itemsList"></tbody>
    </table>

    <div class="total-section">
        <div id="taxCalculation" style="font-size: 12px; margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px;"></div>
        <div class="total-row">
            <span>الإجمالي الشامل:</span>
            <span id="grandTotal">0.00 ﷼</span>
        </div>
        <div id="paymentDetails" style="font-size: 12px; margin-top: 8px; font-weight: bold;"></div>
    </div>

    <div class="footer">
        <div id="dispFooter" style="white-space: pre-line; font-weight: bold;"></div>
        <div style="margin-top: 12px; font-weight: 900; font-size: 9px; letter-spacing: 1px;">نظام شاهي وليف السحابي الموحد</div>
        <div style="height: 40px;"></div> 
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastOrderCached = null;

    function loadSettings() {
        const saved = JSON.parse(localStorage.getItem('receiptSettings')) || {
            title: "🌿 شاهي وليف",
            header: "الرقم الضريبي: \nالفرع: \nالعنوان: ",
            footer: "شكراً لزيارتكم! نتشرف بخدمتكم دائماً 🍃",
            ip: "",
            port: "9100"
        };
        document.getElementById('editTitle').value = saved.title;
        document.getElementById('editHeader').value = saved.header;
        document.getElementById('editFooter').value = saved.footer;
        document.getElementById('printerIP').value = saved.ip || "";
        document.getElementById('printerPort').value = saved.port || "9100";
        updateLive();
    }

    function updateLive() {
        document.getElementById('dispTitle').innerText = document.getElementById('editTitle').value;
        document.getElementById('dispHeader').innerText = document.getElementById('editHeader').value;
        document.getElementById('dispFooter').innerText = document.getElementById('editFooter').value;
    }

    function saveSettings() {
        const settings = {
            title: document.getElementById('editTitle').value,
            header: document.getElementById('editHeader').value,
            footer: document.getElementById('editFooter').value,
            ip: document.getElementById('printerIP').value,
            port: document.getElementById('printerPort').value
        };
        localStorage.setItem('receiptSettings', JSON.stringify(settings));
        alert("تم حفظ البيانات وعنوان الـ IP بنجاح! ✅");
        updateLive();
    }

    let isFirstLoad = true;
    db.ref('sales').limitToLast(1).on('child_added', (snapshot) => {
        const order = snapshot.val();
        lastOrderCached = order;
        updateLive();
        
        if (isFirstLoad) {
            isFirstLoad = false;
            renderReceipt(order, false); 
            return;
        }
        
        renderReceipt(order, true); 
    });

    function renderReceipt(order, shouldPrint) {
        if (!order || !order.items) return;

        const generatedInvoiceId = order.invoiceId || "INV-" + Math.floor((order.timestamp || Date.now()) / 1000);
        const orderDate = order.timestamp ? new Date(order.timestamp).toLocaleString('ar-SA') : new Date().toLocaleString('ar-SA');
        
        let totalQty = 0;

        document.getElementById('orderInfo').innerHTML = `
            <div class="info-row"><span>رقم الفاتورة:</span> <span style="font-weight:bold;">${generatedInvoiceId}</span></div>
            <div class="info-row"><span>التاريخ والوقت:</span> <span>${orderDate}</span></div>
            <div class="info-row"><span>رقم العميل:</span> <span>${order.phone || 'عميل سفري'}</span></div>
        `;

        document.getElementById('itemsList').innerHTML = order.items.map(item => {
            const qty = parseInt(item.q || item.qty || 1);
            totalQty += qty;
            const itemTotal = parseFloat(item.totalItem || (item.price * qty));
            return `
                <tr>
                    <td style="font-weight:bold; max-width: 130px;">${item.name}</td>
                    <td style="text-align: center; font-weight:bold;">${qty}</td>
                    <td style="text-align: left; font-weight:bold;">${itemTotal.toFixed(2)} ﷼</td>
                </tr>
            `;
        }).join('');

        const grandTotalVal = parseFloat(order.total || 0);
        const netVal = (grandTotalVal / 1.15);
        const taxVal = grandTotalVal - netVal;

        document.getElementById('taxCalculation').innerHTML = `
            <div class="info-row" style="color:#444;"><span>إجمالي عدد القطع:</span> <span>${totalQty} قطع</span></div>
            <div class="info-row" style="color:#444;"><span>المبلغ الخاضع للضريبة:</span> <span>${netVal.toFixed(2)} ﷼</span></div>
            <div class="info-row" style="color:#444;"><span>ضريبة القيمة المضافة (15%):</span> <span>${taxVal.toFixed(2)} ﷼</span></div>
        `;

        document.getElementById('grandTotal').innerText = grandTotalVal.toFixed(2) + " ﷼";
        
        let paymentMethodText = `طريقة الدفع: ${order.method || 'نقدي'}`;
        if (order.paymentDetails) {
            let details = [];
            if(parseFloat(order.paymentDetails.cash) > 0) details.push(`كاش: ${parseFloat(order.paymentDetails.cash).toFixed(2)} ﷼`);
            if(parseFloat(order.paymentDetails.card) > 0) details.push(`شبكة: ${parseFloat(order.paymentDetails.card).toFixed(2)} ﷼`);
            if(details.length > 0) paymentMethodText += ` (${details.join(' + ')})`;
        }
        document.getElementById('paymentDetails').innerText = paymentMethodText;

        if (shouldPrint) {
            sendToPrinterSocket();
        }
    }

    // محرك تحويل النصوص لبايتات متوافقة مع الطابعات الحرارية الشاملة
    function textToRawBytes(text) {
        const encoder = new TextEncoder();
        return encoder.encode(text + "\n");
    }

    // المحرك الذكي المطور خصيصاً لبيئة الآيباد ومتصفح Safari
    function sendToPrinterSocket() {
        const ip = document.getElementById('printerIP').value.trim();
        const port = document.getElementById('printerPort').value.trim() || "9100";

        // إذا لم يتم تهيئة الـ IP، نفتح محرك طباعة الآيباد AirPrint فوراً لمنع تعطل الطلبات
        if (!ip) {
            window.print();
            return;
        }

        // استخدام Fetch API عبر بروتوكول HTTP الخام لإرسال حزم الأوامر لـ IP الطابعة مباشرة دون قيود WebSocket
        // المنفذ 9100 هو المنفذ القياسي العالمي الموحد لجميع الطابعات الشبكية (Epson, Star, Xprinter, Bixolon)
        let escCommands = [];
        
        escCommands.push(new Uint8Array([0x1B, 0x40])); // تفعيل وتهيئة الطابعة الافتراضية
        escCommands.push(new Uint8Array([0x1B, 0x61, 0x01])); // محاذاة النص في المنتصف
        escCommands.push(textToRawBytes(document.getElementById('editTitle').value));
        escCommands.push(textToRawBytes(document.getElementById('editHeader').value));
        escCommands.push(textToRawBytes("--------------------------------"));

        escCommands.push(new Uint8Array([0x1B, 0x61, 0x02])); // محاذاة النص لليمين تفادياً لمشاكل قلب السطور بالآيباد
        
        if (lastOrderCached && lastOrderCached.items) {
            const invId = lastOrderCached.invoiceId || "INV";
            escCommands.push(textToRawBytes(`فاتورة رقم: ${invId}`));
            escCommands.push(textToRawBytes("الأصناف:"));
            lastOrderCached.items.forEach(item => {
                let q = item.q || item.qty || 1;
                let t = parseFloat(item.totalItem || (item.price * q)).toFixed(2);
                escCommands.push(textToRawBytes(`- ${item.name} x${q} : ${t} SAR`));
            });
        } else {
            // في حال ضغط زر "اختبار الاتصال" بدون وجود طلبات في الكاش
            escCommands.push(textToRawBytes("طلب تجريبي - اختبار اتصال الطابعة"));
        }

        escCommands.push(textToRawBytes("--------------------------------"));
        escCommands.push(textToRawBytes("الإجمالي الشامل: " + document.getElementById('grandTotal').innerText));
        escCommands.push(textToRawBytes("--------------------------------"));
        
        escCommands.push(new Uint8Array([0x1B, 0x61, 0x01])); // العودة للمنتصف
        escCommands.push(textToRawBytes(document.getElementById('editFooter').value));
        escCommands.push(textToRawBytes("\n\n\n")); // مسافة أمان لكي تظهر الفاتورة واضحة قبل القص
        escCommands.push(new Uint8Array([0x1D, 0x56, 0x41, 0x00])); // الأمر العالمي لقص الورق تلقائياً

        // تجميع المصفوفات البايتية وضخها بالشبكة
        let totalLen = escCommands.reduce((a, arr) => a + arr.length, 0);
        let finalBuffer = new Uint8Array(totalLen);
        let currentOffset = 0;
        escCommands.forEach(arr => {
            finalBuffer.set(arr, currentOffset);
            currentOffset += arr.length;
        });

        // إرسال الحزمة بصمت تام
        fetch(`http://${ip}:${port}`, {
            method: 'POST',
            mode: 'no-cors', // لتخطي جدار الحماية (CORS) الخاص بمتصفحات الآيباد
            body: finalBuffer,
            headers: { 'Content-Type': 'application/octet-stream' }
        })
        .then(() => {
            console.log("تم إرسال البيانات إلى الطابعة المستهدفة عبر الشبكة بنجاح.");
        })
        .catch(err => {
            console.warn("جدار حماية الآيباد منع الإرسال المباشر أو الطابعة لا تستجيب، جاري تفعيل نظام AirPrint الاحتياطي...");
            window.print();
        });
    }

    window.onload = loadSettings;
</script>
</body>
</html>
